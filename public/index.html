<body>
<header>
  <div>
    <div class="brand-name">OM Generator</div>
  </div>
  <div class="stage-bar" id="stageBar"></div>
</header>
<div class="container"><div id="appContent"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="test-data.js"></script>
<script>
const STAGES=["Deal inputs","Financing","Investment story","Uploads","Validation","OM preview"];
let stage=0;
const inputs={propName:"",address:"",city:"",state:"",zip:"",assetType:"",yearBuilt:"",yearReno:"",totalUnits:"",totalSF:"",stories:"",unitMix:"",amenities:"",capex:"",parking:"",loanType:"",loanAmt:"",amortization:"",prepayment:"",loanTerm:"",ltc:"",ltv:"",dy:"",recourse:"",guarantor:"",sourcesUses:"",askingPrice:"",noi:"",capRate:"",occupancy:"",proFormaNOI:"",exitCap:"",market:"",strategy:"",valueAdd:"",risks:"",sponsorName:"",sponsorTrack:"",brokerName:"",tagline:"",estSpread:""};
let files={t12:null,rentRoll:null,proForma:null};
let parsedFiles={};
let taggedImages=[];   // { tag, src, name } — replaces flat uploadedImages array
let omContent=null;
let chartsRegistry = {};
let errors=[],warnings=[],suggestions=[];

const fmtCur=v=>{if(!v)return"—";const n=parseFloat(String(v).replace(/[^0-9.]/g,""));return isNaN(n)?v:new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",maximumFractionDigits:0}).format(n);};
const fmtPct=v=>{if(!v)return"—";const n=parseFloat(String(v).replace(/[^0-9.]/g,""));return isNaN(n)?v:n+"%";};
const esc=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");


function attachListeners(){
  Object.keys(inputs).forEach(key=>{
    const el=document.getElementById(key);
    if(!el)return;
    el.addEventListener("input",e=>{inputs[key]=e.target.value;});
    el.addEventListener("change",e=>{inputs[key]=e.target.value;});
  });
}

function renderStageBar(){
  document.getElementById("stageBar").innerHTML=STAGES.map((s,i)=>
    `<span class="stage-pill ${i===stage?"active":i<stage?"done":""}">${i<stage?"✓ ":""}${i+1}. ${s}</span>`
    +(i<STAGES.length-1?`<span class="stage-sep">›</span>`:"")
  ).join("");
}

function f(key,label,type="text",opts=null,full=false,ph=""){
  const v=esc(inputs[key]||"");
  const cls="field"+(full?" full":"");
  if(type==="select")return`<div class="${cls}"><label for="${key}">${label}</label><select id="${key}"><option value="">Select…</option>${opts.map(o=>`<option value="${esc(o)}"${inputs[key]===o?" selected":""}>${esc(o)}</option>`).join("")}</select></div>`;
  if(type==="textarea")return`<div class="${cls}"><label for="${key}">${label}</label><textarea id="${key}" placeholder="${esc(ph)}">${v}</textarea></div>`;
  return`<div class="${cls}"><label for="${key}">${label}</label><input type="text" id="${key}" value="${v}" placeholder="${esc(ph)}"></div>`;
}

function s0(){return`
  <div class="section-label">Property identity</div>
  <div class="grid2">
    ${f("propName","Property name","text",null,true)}
    ${f("address","Street address","text",null,true)}
    ${f("city","City")}${f("state","State")}${f("zip","ZIP Code","text",null,true,"e.g. 28209")}
    ${f("assetType","Asset type","select",["Multifamily","Office","Retail","Industrial","Mixed-Use","Self-Storage","Hospitality","Land"])}
    ${f("yearBuilt","Year built")}${f("yearReno","Year renovated","text",null,false,"If applicable")}
  </div>
  <div class="section-label">Physical details</div>
  <div class="grid2">
    ${f("totalUnits","Total units","text",null,false,"Multifamily")}${f("totalSF","Total SF","text",null,false,"Commercial")}
    ${f("stories","Stories")}${f("parking","Parking")}
    ${f("unitMix","Unit mix","text",null,false,"e.g. 60% 1BR, 40% 2BR")}
    ${f("amenities","Key amenities","text",null,false,"e.g. rooftop, gym, dog park")}
    ${f("capex","Recent CapEx / renovations","text",null,true,"e.g. New roof 2023, lobby reno 2022")}
  </div>
  <div class="section-label">Property images (optional)</div>
  <p style="font-size:12px;color:var(--text-2);margin-bottom:10px;">Upload photos and assign each one to a section of the OM.</p>
  <div class="img-upload-zone" onclick="document.getElementById('imgUpload').click()" style="margin-bottom:6px;">
    <input type="file" id="imgUpload" accept="image/jpeg,image/png,image/webp" multiple style="display:none" onchange="addTaggedImages(this.files);this.value='';">
    <span style="font-size:18px;color:var(--gold);">+</span>
    <span style="font-size:13px;color:var(--text-2);">Add Photos</span>
  </div>
  <p style="font-size:11px;color:var(--text-3);margin-bottom:4px;">Tip: You can assign multiple photos to <strong style="color:var(--text-2);">Gallery</strong>. All other sections use the first photo assigned to that tag.</p>
  <div class="tagged-img-list" id="taggedImgList"></div>
  <div class="section-label">Branding (optional)</div>
  <div class="grid2">${f("brokerName","Broker / firm name")}${f("tagline","Offering tagline","text",null,false,"Leave blank for AI to generate")}</div>`;}

// ─── TAGGED IMAGE SYSTEM ──────────────────────────────────────────────────────
const TAG_OPTIONS = [
  { value:'cover',    label:'Cover Hero' },
  { value:'property', label:'Property Overview Header' },
  { value:'detail',   label:'Property Detail (Asset Profile)' },
  { value:'gallery',  label:'Gallery' },
  { value:'sponsor',  label:'Sponsor / Logo' }
];

function addTaggedImages(fileList){
  Array.from(fileList).forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      // Default tag: cover for first image, gallery for subsequent
      const defaultTag = taggedImages.length===0 ? 'cover' : 'gallery';
      taggedImages.push({ tag: defaultTag, src: e.target.result, name: file.name });
      renderTaggedImages();
    };
    reader.readAsDataURL(file);
  });
}

function renderTaggedImages(){
  const list=document.getElementById("taggedImgList");
  if(!list)return;
  if(!taggedImages.length){ list.innerHTML=''; return; }
  list.innerHTML=taggedImages.map((img,i)=>`
    <div class="tagged-img-card">
      <img class="tagged-img-thumb" src="${img.src}" alt="${esc(img.name)}">
      <div class="tagged-img-info">
        <div class="tagged-img-name" title="${esc(img.name)}">${esc(img.name)}</div>
        <select class="tagged-img-select" onchange="updateImageTag(${i},this.value)">
          ${TAG_OPTIONS.map(o=>`<option value="${o.value}"${img.tag===o.value?' selected':''}>${o.label}</option>`).join('')}
        </select>
      </div>
      <button class="tagged-img-remove" onclick="removeTaggedImage(${i})" title="Remove">✕</button>
    </div>`).join('');
}

function updateImageTag(i, newTag){ if(taggedImages[i]) taggedImages[i].tag=newTag; renderTaggedImages(); }
function removeTaggedImage(i){ taggedImages.splice(i,1); renderTaggedImages(); }

function s1(){return`
  <div class="section-label">Financing request</div>
  <div class="grid2">
    ${f("loanType","Loan type","select",["Permanent","Bridge","Construction","Mezzanine","CMBS","Agency — Freddie Mac","Agency — Fannie Mae","HUD/FHA","Life Company"])}
    ${f("loanAmt","Loan amount requested ($)")}
    ${f("loanTerm","Loan term","text",null,false,"e.g. 10 years")}
    ${f("recourse","Recourse","select",["Non-recourse","Partial recourse","Full recourse"])}
    ${f("ltc","LTC (%)","text",null,false,"e.g. 65")}${f("ltv","LTV (%)","text",null,false,"e.g. 60")}
    ${f("dy","Debt yield (%)","text",null,false,"e.g. 8.5")}${f("guarantor","Guarantor entity")}
  </div>
  <div style="margin-top:4px;margin-bottom:8px;">
    <label style="font-size:13px;color:var(--text-2);display:block;margin-bottom:6px;">Est. Agency Spread (bps)</label>
    <input type="number" id="estSpread" placeholder="170" min="100" max="350" step="5"
      style="width:140px;padding:8px 12px;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;color:var(--text-1);font-size:13px;">
    <div style="font-size:11px;color:var(--text-3);margin-top:4px;">Used to estimate all-in rate. Default 170bps if blank.</div>
  </div>
  <div class="grid2" style="margin-top:14px;">
    ${f("amortization","Amortization","text",null,false,"e.g. 30 Years, Interest Only — defaults by loan type")}
    ${f("prepayment","Prepayment Terms","text",null,false,"e.g. Yield Maintenance — defaults by loan type")}
  </div>
  <div class="section-label">Sources & uses</div>
  <div class="grid2">${f("sourcesUses","Sources & uses summary","textarea",null,true,"e.g. Equity: $4.2M (35%), Loan: $7.8M (65%), Total: $12M")}</div>`;}

function s2(){return`
  <div class="section-label">Deal metrics</div>
  <div class="grid2">
    ${f("askingPrice","Asking price / total cost ($)")}${f("noi","Current NOI ($)")}
    ${f("capRate","Cap rate (%)","text",null,false,"e.g. 5.25")}${f("occupancy","Current occupancy (%)","text",null,false,"e.g. 94")}
    ${f("proFormaNOI","Pro forma NOI ($)","text",null,false,"Stabilized")}${f("exitCap","Projected exit cap rate (%)","text",null,false,"e.g. 5.5")}
    ${f("market","Market / submarket")}${f("strategy","Investment strategy","select",["Core","Core-Plus","Value-Add","Opportunistic","Development"])}
  </div>
  <div class="section-label">Investment story & risks</div>
  <div class="grid2">
    ${f("valueAdd","Value-add / business plan drivers","textarea",null,true,"e.g. unit interior upgrades, rebrand, add amenities")}
    ${f("risks","Key risks to score (optional)","textarea",null,true,"Leave blank — AI auto-identifies top 5 risks from market data. Or enter specific risks to include alongside AI-identified ones.")}
  </div>
  <div class="section-label">Sponsor</div>
  <div class="grid2">
    ${f("sponsorName","Sponsor / company name")}
    ${f("sponsorTrack","Track record","text",null,true,"e.g. 15 years, $500M+ in multifamily across Mid-Atlantic")}
  </div>`;}

function s3(){
  const box=(key,label,desc)=>{
    const file=files[key];const pd=parsedFiles[key];
    const hasData=pd&&pd.mappings&&Object.keys(pd.mappings).length>0;
    const hasError=pd&&pd.summary&&pd.summary.note;
    return`<div class="upload-zone ${file?(hasData?"uploaded":hasError?"error":"uploaded"):""}" onclick="triggerUpload('${key}')">
      <input type="file" id="file_${key}" accept=".xlsx,.csv,.xls" style="display:none" onchange="handleFile('${key}',this.files[0])">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div>
          <div style="font-size:13px;font-weight:500;margin-bottom:3px;">${label}</div>
          <div style="font-size:12px;color:var(--text-2);">${file?file.name:desc}</div>
        </div>
        ${file?`<div style="color:${hasData?"var(--success)":"var(--warn)"};font-size:18px;">${hasData?"✓":"⚠"}</div>`:`<div style="font-size:12px;color:var(--text-3);">Click to upload</div>`}
      </div>
      ${hasData?`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;">${Object.entries(pd.mappings).slice(0,6).map(([k,v])=>`<span class="tag success">${esc(k)} → ${esc(v)}</span>`).join("")}</div>`:""}
      ${hasError&&!hasData?`<div style="margin-top:8px;font-size:11px;color:#e8d09a;">⚠ ${esc(pd.summary.note)}</div>`:""}
    </div>`;
  };
  return`
    <div class="section-label">Upload financial files</div>
    <p style="font-size:13px;color:var(--text-2);margin-bottom:16px;">AI automatically maps your column names — no reformatting needed. All files are optional.</p>
    ${box("t12","T12 / Income & Expense","Trailing 12-month actuals — EGI, OpEx, NOI")}
    ${box("rentRoll","Rent Roll","Unit mix, in-place rents, market rents, lease dates")}
    ${box("proForma","Pro Forma","Stabilized projections and assumptions")}
    <div id="parseStatus" style="font-size:12px;color:var(--text-2);margin-top:8px;min-height:20px;"></div>`;}

function triggerUpload(key){document.getElementById("file_"+key).click();}

async function handleFile(key,file){
  if(!file)return;
  files[key]=file;
  const status=document.getElementById("parseStatus");
  if(status)status.innerHTML=`<span class="spinner" style="width:12px;height:12px;border-width:1.5px;"></span> Parsing ${file.name}…`;

  try{
    const formData=new FormData();
    formData.append("file",file);
    formData.append("fileType",key);
    const resp=await fetch("/api/parse-file",{method:"POST",body:formData});
    const data=await resp.json();
    parsedFiles[key]=data;
    console.log(`File parse result for ${key}:`,data);
  }catch(err){
    console.error("File parse error:",err);
    parsedFiles[key]={success:false,mappings:{},summary:{note:"Upload failed — "+err.message}};
  }
  if(status)status.innerHTML="";
  render();
}

function validate(){
  errors=[];warnings=[];suggestions=[];
  if(!inputs.propName)errors.push("Property name is required");
  if(!inputs.address)errors.push("Property address is required");
  if(!inputs.zip)errors.push("ZIP code is required");
  if(!inputs.assetType)errors.push("Asset type is required");
  if(!inputs.askingPrice)errors.push("Asking price / total cost is required");
  if(!inputs.noi)errors.push("Current NOI is required");
  if(!inputs.loanAmt)errors.push("Loan amount requested is required");
  const price=parseFloat(String(inputs.askingPrice).replace(/[^0-9.]/g,""));
  const noi=parseFloat(String(inputs.noi).replace(/[^0-9.]/g,""));
  const cap=parseFloat(String(inputs.capRate).replace(/[^0-9.]/g,""));
  if(price&&noi&&cap){const imp=(noi/price)*100;if(Math.abs(imp-cap)>0.5)warnings.push(`Cap rate mismatch: stated ${cap.toFixed(2)}% vs. implied ${imp.toFixed(2)}% (NOI÷price) — delta ${Math.abs(imp-cap).toFixed(2)}%`);}
  const pfNoi=parseFloat(String(inputs.proFormaNOI).replace(/[^0-9.]/g,""));
  if(pfNoi&&noi&&pfNoi>noi*1.2&&!inputs.valueAdd)warnings.push("Pro forma NOI >20% above T12 NOI with no value-add strategy noted");
  const loan=parseFloat(String(inputs.loanAmt).replace(/[^0-9.]/g,""));
  if(loan&&price&&(loan/price)>0.80)warnings.push(`LTC of ${((loan/price)*100).toFixed(1)}% exceeds 80% — expect lender scrutiny`);
  const dy=parseFloat(String(inputs.dy).replace(/[^0-9.]/g,""));
  if(dy&&dy<6.5)warnings.push(`Debt yield of ${dy}% is below 6.5% — may face pushback in current environment`);
  if(!inputs.sponsorTrack)suggestions.push("No sponsor track record — add 1-2 sentences for a stronger sponsor section");
  if(!files.proForma)suggestions.push("Pro forma not uploaded — OM will show T12 financials only");
  if(taggedImages.length===0)suggestions.push("No property photos uploaded — consider adding for a more complete OM");
  if(!inputs.tagline)suggestions.push("No tagline — AI will generate one automatically");
  suggestions.push("Generation will fetch live A.CRE market data + web search — allow 30-45 seconds");
}

function s4(){
  validate();
  const icon={err:"✕",warn:"△",sugg:"○",ok:"✓"};
  let html=`<div class="section-label">Validation results</div>`;
  if(!errors.length&&!warnings.length)html+=`<div class="val-item ok"><span>${icon.ok}</span><span>All required fields present — ready to generate</span></div>`;
  errors.forEach(e=>html+=`<div class="val-item err"><span>${icon.err}</span><span>${esc(e)}</span></div>`);
  warnings.forEach(w=>html+=`<div class="val-item warn"><span>${icon.warn}</span><span>${esc(w)}</span></div>`);
  suggestions.forEach(s=>html+=`<div class="val-item sugg"><span>${icon.sugg}</span><span>${esc(s)}</span></div>`);
  html+=`<div class="section-label" style="margin-top:28px;">Input summary</div><div class="confirm-grid">`;
  [["Property",inputs.propName],["Address",`${inputs.address}, ${inputs.city}, ${inputs.state} ${inputs.zip}`],["Asset type",inputs.assetType],["Asking price",fmtCur(inputs.askingPrice)],["Current NOI",fmtCur(inputs.noi)],["Cap rate",fmtPct(inputs.capRate)],["Occupancy",fmtPct(inputs.occupancy)],["Loan type",inputs.loanType],["Loan amount",fmtCur(inputs.loanAmt)],["Debt yield",fmtPct(inputs.dy)],["Strategy",inputs.strategy],["T12",files.t12?`✓ ${files.t12.name}`:"—"],["Rent roll",files.rentRoll?`✓ ${files.rentRoll.name}`:"—"],["Photos",taggedImages.length>0?`${taggedImages.length} uploaded (${[...new Set(taggedImages.map(i=>i.tag))].map(t=>TAG_OPTIONS.find(o=>o.value===t)?.label||t).join(', ')})`:"—"]].forEach(([k,v])=>{
    html+=`<div class="confirm-row"><span class="confirm-key">${esc(k)}</span><span class="confirm-val">${esc(v||"—")}</span></div>`;
  });
  html+=`</div>`;
  return html;
}

function renderOM() {
  Object.values(chartsRegistry).forEach(c => { try { c.destroy(); } catch(e) {} });
  chartsRegistry = {};

  const o = omContent;
  const a = o._acreData || {};

  // ── helpers ──
  const priClass = color => ({ red:'pri-red', orange:'pri-orange', yellow:'pri-yellow', green:'pri-green' }[color] || 'pri-green');
  const secFooter = (section, lbl) => `<div class="om-sec-footer"><span>${esc(inputs.propName)}</span><span>${section}${lbl?' — '+lbl:''}</span><span>${esc(inputs.city)}, ${esc(inputs.state)} · Confidential</span></div>`;
  const secHeader = (num, title, sub) => `<div class="om-sec-header"><span class="om-sec-eye">${num?'Section '+num:''}</span><span class="om-sec-title">${title}</span>${sub?`<span class="om-sec-sub">${sub}</span>`:''}</div>`;

  // ── Rate data: A.CRE MCP live → computed fallback ──
  const t10 = a.rates?.treasury_10y ? parseFloat(a.rates.treasury_10y) : 4.25;
  const t7  = a.rates?.treasury_7y  != null ? parseFloat(a.rates.treasury_7y) : null;  // ⚠ backend does not yet emit treasury_7y — always null until server fix
  const t5  = a.rates?.treasury_5y  ? parseFloat(a.rates.treasury_5y)  : 3.95;
  const sofr = a.rates?.sofr ? parseFloat(a.rates.sofr) : 5.30;
  const freddieMFRate = (a.rates?.freddieMFRate && parseFloat(a.rates.freddieMFRate) > 0)
    ? parseFloat(a.rates.freddieMFRate)
    : +(t10 + 1.70).toFixed(2);

  // ── Rate source badges (server passes rateSources: "live"|"websearch"|"fallback") ──
  const rSrc = a.rateSources || {};
  const t7Src = rSrc.treasury_7y || 'fallback';
  const rateBadge = (src) => {
    if (src === 'live')      return `<span style="font-size:9px;color:#2d7a3a;border:1px solid rgba(45,122,58,0.45);border-radius:3px;padding:1px 6px;margin-left:6px;vertical-align:middle;font-family:'DM Sans',sans-serif;font-weight:500;letter-spacing:0.3px;">A.CRE</span>`;
    if (src === 'websearch') return `<span style="font-size:9px;color:#1e5fa3;border:1px solid rgba(30,95,163,0.45);border-radius:3px;padding:1px 6px;margin-left:6px;vertical-align:middle;font-family:'DM Sans',sans-serif;font-weight:500;letter-spacing:0.3px;">WEB</span>`;
    return `<span style="font-size:9px;color:#c9a84c;border:1px solid rgba(201,168,76,0.45);border-radius:3px;padding:1px 6px;margin-left:6px;vertical-align:middle;font-family:'DM Sans',sans-serif;font-weight:400;letter-spacing:0.3px;">Est.</span>`;
  };
  const anyRateFallback = ['treasury_10y','treasury_5y','sofr'].some(k => (rSrc[k] || 'fallback') === 'fallback');

  // ── S&U ──
  const loanAmt = parseFloat(String(inputs.loanAmt||'0').replace(/[^0-9.]/g,''))||0;
  const price   = parseFloat(String(inputs.askingPrice||'0').replace(/[^0-9.]/g,''))||0;
  const equity  = price > loanAmt ? price - loanAmt : price * 0.35;
  const total   = loanAmt + equity;
  const debtPct = total > 0 ? Math.round((loanAmt/total)*100) : 65;
  const equityPct = 100 - debtPct;

  // ── photos — PHASE 5: deduplicate by role ──
  const fullAddress = `${inputs.address}, ${inputs.city}, ${inputs.state} ${inputs.zip}`;
  const mapSrc = `/api/map-image?address=${encodeURIComponent(fullAddress)}`;
  // ── Tagged image helpers ──────────────────────────────────────────
  const getImageByTag  = tag => taggedImages.find(img => img.tag === tag)?.src || null;
  const getImagesByTag = tag => taggedImages.filter(img => img.tag === tag).map(img => img.src);

  // ── Image variables derived from tagged system ────────────────────
  const coverPhotoSrc = getImageByTag('cover');
  const coverPhoto = coverPhotoSrc

  // Derived subtotals

  <div class="om-section">

    <div class="om-sec-body">
      ${(()=>{
        // ── Helpers ──
        const _p = v => parseFloat(String(v||'0').replace(/[^0-9.]/g,'')) || 0;
        const _fmtM = v => v ? '$' + (v/1e6).toFixed(1) + 'M' : '—';
        const _pmt = (P, r, years) => { if(!P||!r) return 0; if(!years) return P*r; const m=r/12,n=years*12; return P*m/(1-Math.pow(1+m,-n))*12; };
        const _maxP = (DS, r, years) => { if(!DS||!r) return 0; if(!years) return DS/r; const m=r/12,n=years*12; return (DS/12)*(1-Math.pow(1+m,-n))/m; };
        const _bal = (P, r, years, paidYears) => { if(!P||!r||!years) return P; const m=r/12,n=years*12,pp=paidYears*12; const pmtM=P*m/(1-Math.pow(1+m,-n)); return P*Math.pow(1+m,pp)-pmtM*(Math.pow(1+m,pp)-1)/m; };
        const _maxRate = (noi, P, years, floor) => { if(!noi||!P) return 0; const target=noi/floor; if(!years) return target/P; let lo=0.0001,hi=0.30; for(let i=0;i<60;i++){ const mid=(lo+hi)/2; if(_pmt(P,mid,years)<target) lo=mid; else hi=mid;} return (lo+hi)/2; };
        const _dscrColor = d => d>=1.25?'dscr-green':d>=1.15?'dscr-yellow':d>=1.00?'dscr-orange':'dscr-red';

        // ── Inputs ──
        const _loanAmtN = _p(inputs.loanAmt);
        const _noiN     = _p(inputs.noi);
        const _pfNoiN   = _p(inputs.proFormaNOI);
        const _occN     = _p(inputs.occupancy);
        const _inPlaceRent = (_rrEntry ? _safeMonthly(_rrEntry[1]) : 0) || _p(inputs.avgRent) || _p(inputs.avgInPlaceRent);
        const _spreadBps = _p(inputs.estSpread) || 170;
        const _baseRate  = +(t10 + _spreadBps/100).toFixed(4) / 100;
        const _amortYears = (() => { const s=String(inputs.amortization||''); if(/interest only|IO/i.test(s)) return 0; const n=parseInt(s.replace(/[^0-9]/g,'')); return n||30; })();

        // ── Hardcoded constants ──
        const NOI_GROWTH = 0.03;
        const REFI_DSCR_FLOOR = 1.25;
        const MAX_RATE_DSCR_FLOOR = 1.20;
        const OPEX_RATIO_FALLBACK = 0.40;

        // ── OpEx & GPR (from T12 or fallback) ──
        const _opex = (T12 && T12.totalOpex) ? Math.abs(T12.totalOpex) : (_noiN ? _noiN * (OPEX_RATIO_FALLBACK / (1-OPEX_RATIO_FALLBACK)) : 0);
        const _egi  = (T12 && T12.egi) ? Math.abs(T12.egi) : (_noiN + _opex);
        const _gpr  = (T12 && T12.gpr) ? Math.abs(T12.gpr) : (_occN ? _egi / (_occN/100) : _egi / 0.92);

        // ── DSCR Matrix ──
        const _rateScenarios = [-0.005, 0, 0.010, 0.020];
        const _noiScenarios = [
          { label: 'NOI −10%',     val: _noiN * 0.9,                isBase: false },
          { label: 'T12 Base NOI', val: _noiN,                       isBase: true  },
          { label: 'Pro Forma NOI',val: _pfNoiN || _noiN * 1.05,     isBase: false },
          { label: 'NOI +10%',     val: _noiN * 1.1,                 isBase: false }
        ];
        const _matrixRows = _noiScenarios.map(noi => {
          const cells = _rateScenarios.map((delta, ci) => {
            const r = _baseRate + delta;
            const ds = _pmt(_loanAmtN, r, _amortYears);
            const dscr = ds > 0 ? noi.val / ds : 0;
            const baseColCls = ci === 1 ? ' base-col' : '';
            return `<td class="dscr-cell ${_dscrColor(dscr)}${baseColCls}">${dscr.toFixed(2)}×</td>`;
          }).join('');
          const rowCls = noi.isBase ? ' class="base-noi"' : '';
          const labelCls = noi.isBase ? 'row-label base-row' : 'row-label';
          return `<tr${rowCls}><td class="${labelCls}">${noi.label}</td>${cells}</tr>`;
        }).join('');
        const _matrixHeaders = _rateScenarios.map((d, i) => {
          const r = _baseRate + d;
          const cls = i === 1 ? ' class="base"' : '';
          const label = i === 0 ? 'Rate −50 bps' : i === 1 ? 'Base Rate' : i === 2 ? 'Rate +100 bps' : 'Rate +200 bps';
          return `<th${cls} style="width:20.5%;">${label}<span class="rate-num">${(r*100).toFixed(2)}%</span></th>`;
        }).join('');

        // ── Break-even ──
        const _baseDS = _pmt(_loanAmtN, _baseRate, _amortYears);
        const _beOcc = (_gpr && _baseDS) ? ((_opex + _baseDS) / _gpr) * 100 : 0;
        const _occCushion = _occN ? (_occN - _beOcc) : 0;
        const _beRevRatio = _egi ? (_opex + _baseDS) / _egi : 0;
        const _beRent = _inPlaceRent ? _inPlaceRent * _beRevRatio : 0;
        const _rentDownside = (_inPlaceRent && _beRent) ? (1 - _beRent/_inPlaceRent) * 100 : 0;
        const _maxSusRate = _maxRate(_noiN, _loanAmtN, _amortYears, MAX_RATE_DSCR_FLOOR) * 100;

        // ── Refi Outlook ──
        const _y10Balance = _bal(_loanAmtN, _baseRate, _amortYears, 10);
        const _y10NOI = _noiN * Math.pow(1 + NOI_GROWTH, 10);
        const _baseRefiRate = _baseRate;
        const _stressRefiRate = _baseRate + 0.020;
        const _refiAmort = _amortYears || 30;
        const _baseMaxRefi   = _maxP(_y10NOI / REFI_DSCR_FLOOR, _baseRefiRate,   _refiAmort);
        const _stressMaxRefi = _maxP(_y10NOI / REFI_DSCR_FLOOR, _stressRefiRate, _refiAmort);
        const _baseCashOut   = _baseMaxRefi   - _y10Balance;
        const _stressCashOut = _stressMaxRefi - _y10Balance;
        const _fmtCash = v => v >= 0 ? '+' + _fmtM(v) : '−' + _fmtM(Math.abs(v));

        return `
        <div class="fin-ss-title">
          <span class="fin-ss-chart-title">DSCR Sensitivity — NOI × Rate Environment</span>
          <span class="fin-ss-hint">Base case outlined · agency min DSCR ${REFI_DSCR_FLOOR.toFixed(2)}×</span>
        </div>
        <table class="fin-ss-table">
          <thead><tr><th></th>${_matrixHeaders}</tr></thead>
          <tbody>${_matrixRows}</tbody>
        </table>
        <div class="fin-ss-legend">
          <span class="fin-ss-legend-item"><span class="fin-ss-legend-dot" style="background:rgba(74,158,106,0.45);"></span>≥ 1.25× (Healthy)</span>
          <span class="fin-ss-legend-item"><span class="fin-ss-legend-dot" style="background:rgba(201,168,76,0.45);"></span>1.15–1.24× (Tight)</span>
          <span class="fin-ss-legend-item"><span class="fin-ss-legend-dot" style="background:rgba(208,112,48,0.45);"></span>1.00–1.14× (Strained)</span>
          <span class="fin-ss-legend-item"><span class="fin-ss-legend-dot" style="background:rgba(224,80,80,0.45);"></span>&lt; 1.00× (Cannot service)</span>
        </div>

        <div class="fin-be-grid">
          <div class="fin-be-card">
            <div class="fin-be-label">Break-Even Occupancy</div>
            <div class="fin-be-val">${_beOcc ? _beOcc.toFixed(1)+'%' : '—'}</div>
            <div class="fin-be-sub">${_occCushion > 0 ? _occCushion.toFixed(1)+'% cushion vs. current '+_occN.toFixed(0)+'%' : (_occN?'vs. current '+_occN.toFixed(0)+'%':'')}</div>
          </div>
          <div class="fin-be-card">
            <div class="fin-be-label">Break-Even Rent / Unit</div>
            <div class="fin-be-val">${_beRent ? '$'+Math.round(_beRent).toLocaleString() : '—'}</div>
            <div class="fin-be-sub">${_rentDownside > 0 ? _rentDownside.toFixed(1)+'% downside from in-place $'+Math.round(_inPlaceRent).toLocaleString() : 'vs. in-place rent'}</div>
          </div>
          <div class="fin-be-card">
            <div class="fin-be-label">Max Sustainable Rate</div>
            <div class="fin-be-val">${_maxSusRate ? _maxSusRate.toFixed(2)+'%' : '—'}</div>
            <div class="fin-be-sub">DSCR holds at ${MAX_RATE_DSCR_FLOOR.toFixed(2)}× minimum</div>
          </div>
        </div>

        <div class="fin-refi">
          <div class="fin-refi-title">Year-10 Refinance Outlook</div>
          <table class="fin-refi-table">
            <thead>
              <tr>
                <th>Metric</th>
                <th class="scenario-base">Base — Stable Rate Env.</th>
                <th class="scenario-stress">Stress — Rates +200 bps</th>
              </tr>
            </thead>
            <tbody>
              <tr><td class="metric-label">Loan Balance at Y10 (after amort)</td><td class="metric-val">${_fmtM(_y10Balance)}</td><td class="metric-val">${_fmtM(_y10Balance)}</td></tr>
              <tr><td class="metric-label">Projected Y10 NOI (3% annual growth)</td><td class="metric-val">${_fmtM(_y10NOI)}</td><td class="metric-val">${_fmtM(_y10NOI)}</td></tr>
              <tr><td class="metric-label">Assumed Refi Rate</td><td class="metric-val">${(_baseRefiRate*100).toFixed(2)}%</td><td class="metric-val">${(_stressRefiRate*100).toFixed(2)}%</td></tr>
              <tr><td class="metric-label">Max Refi Loan @ ${REFI_DSCR_FLOOR.toFixed(2)}× DSCR</td><td class="metric-val">${_fmtM(_baseMaxRefi)}</td><td class="metric-val">${_fmtM(_stressMaxRefi)}</td></tr>
              <tr class="highlight"><td class="metric-label">Cash-Out at Refinance</td><td class="metric-val ${_baseCashOut>=0?'cash-pos':''}">${_fmtCash(_baseCashOut)}</td><td class="metric-val ${_stressCashOut>=0?'cash-pos':''}">${_fmtCash(_stressCashOut)}</td></tr>
            </tbody>
          </table>
        </div>
        `;
      })()}
    </div>
    ${secFooter('Section 02','Stress Tests')}
  </div>

      ];
      const _fmtPop = n => n >= 1000 ? Number(n).toLocaleString() : String(n);

      const _ringsHTML = _ringData.map(r => `

            <div><div class="loc-ring-stat-label">Households</div><div class="loc-ring-stat-val">${_fmtPop(r.households)}</div></div>
            <div><div class="loc-ring-stat-label">Median HHI</div><div class="loc-ring-stat-val">${_fmtHHI(r.hhi)}</div></div>
            <div><div class="loc-ring-stat-label">% Renters</div><div class="loc-ring-stat-val">${_fmtPct(r.renterPct)}</div></div>

      const _calloutHTML = (_college && _pctile)

      // ── Destinations on map: combine all named location POIs for a rich, diverse map ──

        return out || raw.slice(0, 18);

      // Build combined destinations from all structured location arrays.
      // Ring assignment: retail→5min (gold/daily errands), employers+transit→10min (navy/workforce), education→15min (blue/regional)
      const _buildMapDots = () => {
        const dots = [];

        (Array.isArray(o.locationRetail) ? o.locationRetail : []).slice(0, 3).forEach(e => {
          if (e && e.name) dots.push({ name: _truncMapLabel(e.name), ring: 5 });
        });
        // Major employers → 5–10-min rings (workforce)
        (Array.isArray(o.locationMajorEmployers) ? o.locationMajorEmployers : []).slice(0, 3).forEach((e, i) => {
          if (e && e.name) dots.push({ name: _truncMapLabel(e.name), ring: i < 1 ? 5 : 10 });
        });
        // Transit → 10-min ring
        (Array.isArray(o.locationTransit) ? o.locationTransit : []).slice(0, 2).forEach(e => {
          if (e && e.name) dots.push({ name: _truncMapLabel(e.name), ring: 10 });

        // Education → 15-min ring
        (Array.isArray(o.locationEducation) ? o.locationEducation : []).slice(0, 2).forEach(e => {
          if (e && e.name) dots.push({ name: _truncMapLabel(e.name), ring: 15 });
        });
        // Fallback: parse from free-text locationEmployers if no structured data
        if (dots.length === 0) {
          const _empText = o.locationEmployers || '';
          const _empMatches = [...(_empText.matchAll(/([A-Z][A-Za-z &'.,-]{2,40})\s*[\(–-]\s*([\d,.]+[KkMm]?)\s*(?:people|employees|jobs|workers)?/g))];
          _empMatches.slice(0, 8).forEach((m, i) => dots.push({ name: _truncMapLabel(m[1].trim().split(/[,]/)[0]), ring: i < 2 ? 5 : i < 5 ? 10 : 15 }));
        }
        // De-duplicate by name, cap at 8
        const seen = new Set();
        const deduped = dots.filter(d => { if (!d.name || seen.has(d.name)) return false; seen.add(d.name); return true; }).slice(0, 8);

        // ── Merge geocoded positions if available ──
        if (o._mapDots && Array.isArray(o._mapDots.dots)) {
          const geoMap = {};
          o._mapDots.dots.forEach(g => { geoMap[g.name] = g; });
          deduped.forEach(d => {
            const geo = geoMap[d.name];
            if (geo) {
              d.angleDeg     = geo.angleDeg;
              d.distanceMiles= geo.distanceMiles;
              // Override ring based on actual distance
              d.ring = geo.distanceMiles < 0.75 ? 5 : geo.distanceMiles < 2.5 ? 10 : 15;
            }
          });
        }
        return deduped.map((d, i) => ({ ...d, idx: i }));
      };
      const _destinations = _buildMapDots();
      const _ringR = { 5: 78, 10: 175, 15: 270 };
      const _ringFill = { 5: '#c9a84c', 10: '#1e3a5f', 15: '#4a90d9' };
      const _cx = 350, _cy = 330;
      const _hasGeo = o._mapDots && Array.isArray(o._mapDots.dots) && o._mapDots.dots.length > 0;
      const _dotsSVG = (() => {
        const SVG_W = 700, SVG_H = 660, PAD = 14;
        const placed = []; // track label centres for collision detection
        return _destinations.map((d, i) => {
          const angle = d.angleDeg != null
            ? (d.angleDeg - 90) * Math.PI / 180
            : (i / Math.max(_destinations.length, 1)) * 2 * Math.PI - Math.PI/2;
          const r = _ringR[d.ring] || 175;
          const px = _cx + r * Math.cos(angle);
          const py = _cy + r * Math.sin(angle);
          const estW = d.name.length * 6.2; // approximate text width

          // ── Label placement: side for central dots, above/below for edge dots ──
          let lx, ly, anchor;
          const nearLeft  = px < 130;
          const nearRight = px > SVG_W - 130;
          const nearTop   = py < 80;

          if (nearLeft || nearRight) {
            // Too close to left/right edge — place label above or below the dot
            anchor = 'middle';
            lx = Math.max(PAD + estW / 2, Math.min(SVG_W - PAD - estW / 2, px));
            ly = (py > _cy) ? py - 12 : py + 18; // above if lower half, below if upper
          } else if (nearTop) {
            anchor = 'middle';
            lx = Math.max(PAD + estW / 2, Math.min(SVG_W - PAD - estW / 2, px));
            ly = py + 16;
          } else {
            anchor = px >= _cx ? 'start' : 'end';
            lx = px >= _cx ? px + 8 : px - 8;
            ly = py + 4;
          }

          // ── Clamp label within SVG bounds ──
          if (anchor === 'start')  lx = Math.min(lx, SVG_W - estW - PAD);
          if (anchor === 'end')    lx = Math.max(lx, estW + PAD);
          if (anchor === 'middle') lx = Math.max(PAD + estW / 2, Math.min(SVG_W - PAD - estW / 2, lx));
          ly = Math.max(PAD + 10, Math.min(SVG_H - PAD, ly));

          // ── Collision nudge: push label down if too close to a placed label ──
          let attempts = 0;
          while (attempts < 6) {
            const clash = placed.some(p => Math.abs(lx - p.x) < 75 && Math.abs(ly - p.y) < 13);
            if (!clash) break;
            ly += 13;
            ly = Math.min(SVG_H - PAD, ly);
            attempts++;
          }
          placed.push({ x: lx, y: ly });

          return `<circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="5" fill="${_ringFill[d.ring]}" stroke="#fff" stroke-width="1.5"/>`
               + `<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" font-family="DM Sans,sans-serif" font-size="10" fill="#0a1628" text-anchor="${anchor}">${esc(d.name)}</text>`;
        }).join('');
      })();

            <path d="M 350 0 L 365 660" stroke="#cdd6e0" stroke-width="2.5" fill="none" opacity="0.55"/>
            <path d="M 0 330 L 700 320" stroke="#cdd6e0" stroke-width="2" fill="none" opacity="0.5"/>
            <ellipse cx="350" cy="330" rx="300" ry="260" fill="rgba(74,144,217,0.10)" stroke="rgba(74,144,217,0.45)" stroke-width="1.5" stroke-dasharray="6,4"/>
            <text x="640" y="200" font-family="DM Sans,sans-serif" font-size="11" font-weight="700" fill="#4a90d9">15 MIN</text>
            <ellipse cx="350" cy="330" rx="200" ry="170" fill="rgba(30,58,95,0.10)" stroke="rgba(30,58,95,0.55)" stroke-width="1.5" stroke-dasharray="6,4"/>
            <text x="540" y="220" font-family="DM Sans,sans-serif" font-size="11" font-weight="700" fill="#1e3a5f">10 MIN</text>
            <ellipse cx="350" cy="330" rx="100" ry="85" fill="rgba(201,168,76,0.18)" stroke="rgba(201,168,76,0.7)" stroke-width="1.5" stroke-dasharray="6,4"/>
            <text x="442" y="270" font-family="DM Sans,sans-serif" font-size="11" font-weight="700" fill="#a07828">5 MIN</text>
            <circle cx="350" cy="330" r="14" fill="#fff" stroke="#c9a84c" stroke-width="3"/>
            <polygon points="350,317 354,328 365,328 356,334 359,345 350,338 341,345 344,334 335,328 346,328" fill="#c9a84c"/>
            <text x="350" y="365" text-anchor="middle" font-family="Cormorant Garamond,serif" font-size="13" font-weight="700" fill="#0a1628">${esc(inputs.propName||'Subject Property')}</text>

// ─── CHART INITIALIZATION ──────────────────────────────────────────────────────
function initOMCharts(o, a, rates, T12, _totalRentalCalc) {
  T12 = T12 || {};
  _totalRentalCalc = _totalRentalCalc || null;
  if (typeof Chart === 'undefined') return;

  const navy = '#0a1628', blue = '#1e3a5f', lightBlue = '#4a90d9', gold = '#c9a84c';

  // Use pre-computed rates passed from renderOM(); fall back gracefully
  const t10      = (rates && rates.t10)      || (a.rates?.treasury_10y ? parseFloat(a.rates.treasury_10y) : 4.25);
  const t7       = (rates && rates.t7 != null) ? rates.t7 : (a.rates?.treasury_7y != null ? parseFloat(a.rates.treasury_7y) : null);
  const t5       = (rates && rates.t5)       || (a.rates?.treasury_5y  ? parseFloat(a.rates.treasury_5y)  : 3.95);
  const sofr     = (rates && rates.sofr)     || (a.rates?.sofr         ? parseFloat(a.rates.sofr)         : 5.30);
  const freddieMFRate = (rates && rates.freddieMF) || (a.rates?.freddieMFRate ? parseFloat(a.rates.freddieMFRate) : +(t10 + 1.65).toFixed(2));

  const makeChart = (id, config) => {
    const el = document.getElementById(id);
    if (!el) return;
    if (chartsRegistry[id]) { try { chartsRegistry[id].destroy(); } catch(e) {} }
    chartsRegistry[id] = new Chart(el, config);
  };

  // ── Employment concentration horizontal bar chart ────────────────
  (() => {
    const rawSectors = (a.employment?.sectors || []).filter(s => s.share != null);
    if (!rawSectors.length) return;
    const sectors = rawSectors.sort((x, y) => (y.share||0) - (x.share||0)).slice(0, 5);
    const barColors = sectors.map(s =>
      (s.ratio||0) >= 2.0 ? '#1D9E75' :
      (s.ratio||0) >= 1.2 ? '#378ADD' :
      'rgba(255,255,255,0.22)'
    );
    const xMax = Math.ceil(Math.max(...sectors.map(s => s.share||0), 5) / 5) * 5 + 5;
    const _cleanSectorLabel = n => (n||'')
      .replace(/\s*\(NAICS[^)]*\)/gi,'').replace(/ and Waste Management.*/i,'')
      .replace(/ and Technical Services/i,' & Technical').replace(/ Services$/i,'').trim();
    makeChart('chart-emp-concentration', {
      type: 'bar',
      data: {
        labels: sectors.map(s => _cleanSectorLabel(s.label)),
        datasets: [{
          data: sectors.map(s => parseFloat((s.share||0).toFixed(1))),
          backgroundColor: barColors,
          borderRadius: 3,
          borderSkipped: false
        }]
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => {
                const s = sectors[ctx.dataIndex];
                const lines = [` Share: ${(s.share||0).toFixed(1)}% of establishments`];
                if (s.ratio != null) lines.push(` Concentration: ${(s.ratio).toFixed(2)}× county avg`);
                return lines;
              }
            }
          }
        },
        scales: {
          x: {
            max: xMax,
            grid: { color: 'rgba(255,255,255,0.07)' },
            ticks: { color: '#8FA8C0', font: { size: 10 }, callback: v => v + '%' }
          },
          y: {
            grid: { display: false },
            ticks: { color: '#0a1628', font: { size: 10 } }
          }
        }
      }
    });
  })();

  // ── Inline datalabels plugin (no external CDN needed) ─────────────
  const safeNum = (val) => { const n = parseFloat(val); return isNaN(n) ? 0 : n; };
  const datalabelsPlugin = {
    id: 'inlineDatalabels',
    afterDatasetsDraw(chart) {
      const { ctx, data } = chart;
      data.datasets.forEach((ds, di) => {
        const meta = chart.getDatasetMeta(di);
        if (meta.hidden) return;
        meta.data.forEach((bar, i) => {
          const val = safeNum(ds.data[i]);
          if (!val || val === 0) return;
          const absVal = Math.abs(val);
          const label = '$' + (absVal >= 1000000 ? (absVal / 1000000).toFixed(1) + 'M' : absVal >= 1000 ? (absVal / 1000).toFixed(0) + 'K' : absVal.toLocaleString());
          ctx.save();
          ctx.font = 'bold 10px DM Sans, sans-serif';
          ctx.fillStyle = '#1e3a5f';
          ctx.textAlign = 'center';
          ctx.textBaseline = val >= 0 ? 'bottom' : 'top';
          const y = val >= 0 ? bar.y - 4 : bar.y + 4;
          ctx.fillText(label, bar.x, y);
          ctx.restore();
        });
      });
    }
  };

  // ── Rates bar chart ───────────────────────────────────────────────
  const _rateLabels = ['10Y Treasury'];
  const _rateData   = [t10];
  const _rateColors = [navy];
  if (t7 !== null && !isNaN(t7)) { _rateLabels.push('7Y Treasury'); _rateData.push(t7); _rateColors.push(blue); }
  _rateLabels.push('5Y Treasury', 'SOFR');
  _rateData.push(t5, sofr);
  _rateColors.push(blue, lightBlue);
  makeChart('chart-rates', {
    type: 'bar',
    data: {
      labels: _rateLabels,
      datasets: [{ data: _rateData, backgroundColor: _rateColors, borderRadius: 3 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ctx.raw.toFixed(2) + '%' } } },
      scales: {
        y: { ticks: { callback: v => v.toFixed(2) + '%' }, grid: { color: 'rgba(0,0,0,0.05)' } },
        x: { grid: { display: false } }
      }
    }
  });

  // ── Macro backdrop — top employers bar chart ──────────────────────
  const _empFallback = [
    { label: 'Professional & Technical', count: 9822 },
    { label: 'Public Administration',    count: 5143 },
    { label: 'Educational Services',     count: 3937 },
    { label: 'Healthcare',               count: 3200 },
    { label: 'Finance & Insurance',      count: 2800 }
  ];
  const _empSectors = (() => {
    const text = o.locationEmployers || '';
    const matches = [...text.matchAll(/([A-Za-z][^(]{2,40})\s*\(([\d,]+)\s*(?:people|employees|jobs)/g)];
    if (matches.length >= 2) {
      return matches.slice(0, 6).map(m => ({
        label: m[1].replace(/^(?:and|,)\s*/i,'').replace(/,\s*$/,'').trim(),
        count: parseInt(m[2].replace(/,/g,'')) || 0
      })).filter(e => e.count > 0);
    }
    return _empFallback;
  })();

  // ── Location page — employment sectors horizontal bar ────────────
  const _locEmpSectors = (() => {
    // Prefer A.CRE topSectors; fall back to parsing locationEmployers text
    const acreTop = (a.employment?.topSectors || []).slice(0,5).map(s => ({
      label: (s.name || s.sector_name || '').replace(/[&]/g,'&').replace(/\s*\(NAICS[^)]*\)/gi,'').replace(/\s*\([A-Z]\d+\)/g,'').replace(/ and Waste Management and Remediation Services/i,'').replace(/ and Technical Services/i,' & Technical').replace(/ Services$/i,'').trim(),
      count: s.employees || s.employment_count || 0
    })).filter(e => e.count > 0);
    if (acreTop.length >= 2) return acreTop;
    const text = o.locationEmployers || '';
    const matches = [...text.matchAll(/([A-Za-z][^(]{2,35})\s*\(([\d,]+)\s*(?:people|employees|jobs)/g)];
    if (matches.length >= 2) {
      return matches.slice(0,5).map(m => ({
        label: m[1].replace(/^(?:and|,)\s*/i,'').replace(/,\s*$/,'').trim().substring(0,28),
        count: parseInt(m[2].replace(/,/g,'')) || 0
      })).filter(e => e.count > 0);
    }
    return [];
  })();
  if (_locEmpSectors.length >= 2) {
    makeChart('chart-loc-emp', {
      type: 'bar',
      data: {
        labels: _locEmpSectors.map(e => e.label),
        datasets: [{ data: _locEmpSectors.map(e => e.count), backgroundColor: navy, borderLeft: `3px solid ${gold}`, borderRadius: 2 }]
      },
      options: {
        indexAxis: 'y', responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => Number(ctx.raw).toLocaleString() + ' jobs' } } },
        scales: {
          x: { ticks: { callback: v => Number(v) >= 1000 ? (v/1000).toFixed(0)+'K' : v, font: { size: 9 } }, grid: { color: 'rgba(0,0,0,0.05)' } },
          y: { grid: { display: false }, ticks: { font: { size: 9 }, color: '#374151' } }
        }
      }
    });
  }

  // ── Risk heat-map scatter (exclude green / mitigated) ─────────────
  const riskColors = { red: 'rgba(224,80,80,0.75)', orange: 'rgba(208,112,48,0.75)', yellow: 'rgba(201,168,76,0.75)', green: 'rgba(74,158,106,0.75)' };
  const _riskPO = { red: 0, orange: 1, yellow: 2, green: 3 };
  const riskRows = (o.risksAndMitigants || []).slice().sort((a,b)=>(_riskPO[a.priorityColor]??2)-(_riskPO[b.priorityColor]??2)).slice(0, 5);
  const filteredForChart = riskRows
    .map((r, i) => ({ r, num: i + 1 }))
    .filter(({ r }) => r.priorityColor !== 'green');
  const scatterNumPlugin = {
    id: 'scatterNums',
    afterDatasetsDraw(chart) {
      const { ctx } = chart;
      chart.data.datasets.forEach((ds, di) => {
        if (!ds.riskNum) return;
        const meta = chart.getDatasetMeta(di);
        meta.data.forEach(pt => {
          ctx.save();
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 11px sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(String(ds.riskNum), pt.x, pt.y);
          ctx.restore();
        });
      });
    }
  };
  makeChart('chart-risk-scatter', {
    type: 'scatter',
    plugins: [scatterNumPlugin],
    data: {
      datasets: filteredForChart.map(({ r, num }) => ({
        riskNum: num,
        label: `${num}. ${r.risk}`,
        data: [{ x: parseFloat(r.likelihood) || 5, y: parseFloat(r.severity) || 5 }],
        backgroundColor: riskColors[r.priorityColor] || riskColors.yellow,
        pointRadius: 14, pointHoverRadius: 16
      }))
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => `${ctx.dataset.label} (L:${ctx.parsed.x}, S:${ctx.parsed.y})` } } },
      scales: {
        x: { min: 0, max: 11, title: { display: true, text: 'Likelihood →', color: '#6b7280', font: { size: 11 } }, ticks: { stepSize: 1 }, grid: { color: 'rgba(0,0,0,0.05)' } },
        y: { min: 0, max: 11, title: { display: true, text: 'Severity →', color: '#6b7280', font: { size: 11 } }, ticks: { stepSize: 1 }, grid: { color: 'rgba(0,0,0,0.05)' } }
      }
    }
  });

  // ── Unit mix donut ────────────────────────────────────────────────
  makeChart('chart-unitmix', {
    type: 'doughnut',
    data: {
      labels: ['Studio (15%)', '1 Bedroom (40%)', '2 Bedroom (35%)', '3 Bedroom (10%)'],
      datasets: [{ data: [15, 40, 35, 10], backgroundColor: ['#0a1628', '#1e3a5f', '#4a90d9', '#c9a84c'], borderWidth: 2, borderColor: '#fff' }]
    },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { font: { size: 10 }, padding: 8 } } }, cutout: '65%' }
  });

  // ── NOI bridge waterfall — uses real T12 data, falls back to ratio estimates ──
  const _inputNoi = safeNum(parseFloat(String(inputs.noi || '0').replace(/[^0-9.]/g, '')));
  const _hasT12Bridge = T12.gpr !== null || T12.egi !== null || T12.noi !== null;
  let _bridgeGPR, _bridgeLTL, _bridgeVac, _bridgeCon, _bridgeOther, _bridgeOpex, _bridgeNOI;
  if (_hasT12Bridge) {
    _bridgeGPR   = safeNum(T12.gpr        || (_inputNoi ? Math.round(_inputNoi * 1.65) : 0));
    _bridgeLTL   = T12.lossToLease ? -safeNum(Math.abs(T12.lossToLease)) : 0;
    _bridgeVac   = T12.vacancy      ? -safeNum(Math.abs(T12.vacancy))     : 0;
    _bridgeCon   = T12.concessions  ? -safeNum(Math.abs(T12.concessions)) : 0;
    _bridgeOther = T12.totalOther   ?  safeNum(Math.abs(T12.totalOther))  : 0;
    _bridgeOpex  = T12.totalOpex    ? -safeNum(Math.abs(T12.totalOpex))   : 0;
    _bridgeNOI   = T12.noi          ?  safeNum(Math.abs(T12.noi))         : _inputNoi;
  } else {
    const vacFactor = 0.08, concFactor = 0.02, opexFactor = 0.40;
    const _egi = safeNum(Math.round(_inputNoi / (1 - opexFactor)));
    _bridgeGPR  = safeNum(Math.round(_egi / (1 - vacFactor - concFactor)));
    _bridgeLTL  = 0;
    _bridgeVac  = -safeNum(Math.round(_bridgeGPR * vacFactor));
    _bridgeCon  = -safeNum(Math.round(_bridgeGPR * concFactor));
    _bridgeOther = 0;
    _bridgeOpex = -safeNum(Math.round(_egi * opexFactor));
    _bridgeNOI  = _inputNoi;
  }
  // Build labels/data only for non-zero bars
  const _bridgeEntries = [
    { label: 'GPR',           val: _bridgeGPR,   color: navy },
    { label: '− LTL',         val: _bridgeLTL,   color: '#e05050' },
    { label: '− Vacancy',     val: _bridgeVac,   color: '#e05050' },
    { label: '− Concessions', val: _bridgeCon,   color: '#e07070' },
    { label: '+ Other',       val: _bridgeOther, color: lightBlue },
    { label: '− OpEx',        val: _bridgeOpex,  color: '#e07070' },
    { label: 'NOI',           val: _bridgeNOI,   color: '#4a9e6a' },
  ].filter(e => e.val !== 0);
  // ── NOI Bridge Y-axis: dynamic min with one extra even step below the most negative bar ──
  const _bridgeMin = Math.min(..._bridgeEntries.map(e => e.val), 0);
  const _bridgeMax = Math.max(..._bridgeEntries.map(e => e.val), 0);
  const _bridgeRange = _bridgeMax - _bridgeMin || 1;
  const _rawStep = _bridgeRange / 5;
  const _stepMag = Math.pow(10, Math.floor(Math.log10(_rawStep)));
  const _niceStep = Math.ceil(_rawStep / _stepMag) * _stepMag;
  const _axisMin = Math.floor(_bridgeMin / _niceStep) * _niceStep - _niceStep;

  makeChart('chart-noi-bridge', {
    type: 'bar',
    plugins: [datalabelsPlugin],
    data: {
      labels: _bridgeEntries.map(e => e.label),
      datasets: [{ data: _bridgeEntries.map(e => e.val), backgroundColor: _bridgeEntries.map(e => e.color), borderRadius: 3 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      layout: { padding: { top: 20 } },
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => '$' + Number(ctx.raw).toLocaleString() } }
      },
      scales: {
        y: { min: _axisMin, ticks: { stepSize: _niceStep, callback: v => { const a = Math.abs(v); return '$' + (a >= 1000000 ? (a/1000000).toFixed(1)+'M' : a >= 1000 ? (a/1000).toFixed(0)+'K' : v); } }, grid: { color: 'rgba(0,0,0,0.05)' } },
        x: { grid: { display: false } }
      }
    }
  });

  // ── OpEx breakdown horizontal bar ────────────────────────────────
  const _opexCategories = [
    { label: 'Repairs & Maint.',   val: T12.repairsMaint },
    { label: 'Contract Services',  val: T12.contract },
    { label: 'Turnover',           val: T12.turnover },
    { label: 'Administrative',     val: T12.admin },
    { label: 'Advertising',        val: T12.advertising },
    { label: 'Payroll',            val: T12.payroll },
    { label: 'Utilities',          val: T12.utilities },
    { label: 'Property Taxes',     val: T12.taxes },
    { label: 'Insurance',          val: T12.insurance },
    { label: 'Mgmt Fee',           val: T12.mgmt },
    { label: 'Cap. Reserves',      val: T12.capReserves },
  ].filter(c => c.val !== null).map(c => ({ label: c.label, val: Math.abs(safeNum(c.val)) }))
   .sort((a, b) => b.val - a.val);
  makeChart('chart-opex-breakdown', {
    type: 'bar',
    data: {
      labels: _opexCategories.map(c => c.label),
      datasets: [{ data: _opexCategories.map(c => c.val), backgroundColor: blue, borderRadius: 3, barThickness: 14 }]
    },
    options: {
      indexAxis: 'y',
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => '$' + Number(ctx.raw).toLocaleString() } }
      },
      scales: {
        x: { ticks: { callback: v => '$' + (v >= 1000000 ? (v/1000000).toFixed(1)+'M' : v >= 1000 ? (v/1000).toFixed(0)+'K' : v) }, grid: { color: 'rgba(0,0,0,0.05)' } },
        y: { grid: { display: false }, ticks: { font: { size: 10 } } }
      }
    }
  });

}

async function generateOM(){
  const loadingSteps=[
    {id:"s1",text:"Fetching live CRE market data (A.CRE MCP)…"},
    {id:"s2",text:"Web search — market data & rates (Haiku)…"},
    {id:"s2b",text:"Filling data gaps (Sonnet)…"},
    {id:"s3",text:"Building data context…"},
    {id:"s4",text:"Generating OM (Opus)…"}
  ];
  document.getElementById("appContent").innerHTML=`
    <div class="loading">
      <div class="spinner"></div>
      <div style="font-size:15px;margin-bottom:8px;">Generating your offering memorandum</div>
      <div style="font-size:12px;color:var(--text-3);margin-bottom:24px;">Allow 30–45 seconds — live data is being fetched and processed</div>
      <div class="loading-steps">
        ${loadingSteps.map((s,i)=>`<div class="loading-step ${i===0?"active":""}" id="lstep_${s.id}">${s.text}</div>`).join("")}
      </div>
    </div>`;

  // Animate loading steps
  let stepIdx=0;
  const stepInterval=setInterval(()=>{
    if(stepIdx>0){
      const prev=document.getElementById(`lstep_${loadingSteps[stepIdx-1].id}`);
      if(prev){prev.className="loading-step done";}
    }
    if(stepIdx<loadingSteps.length){
      const cur=document.getElementById(`lstep_${loadingSteps[stepIdx].id}`);
      if(cur){cur.className="loading-step active";}
      stepIdx++;
    }else{clearInterval(stepInterval);}
  },8000);

  try{
    const resp=await fetch("/api/generate",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({inputs,parsedFiles})
    });
    clearInterval(stepInterval);
    const data=await resp.json();
    if(!data.success)throw new Error(data.error||"Unknown error");
    omContent=data.content;
    stage=5;
    render();
  }catch(err){
    clearInterval(stepInterval);
    document.getElementById("appContent").innerHTML=`
      <div class="val-item err" style="margin-bottom:16px;"><span>✕</span><span>Generation failed: ${esc(err.message)}</span></div>
      <div style="font-size:12px;color:var(--text-2);margin-bottom:20px;">Check that ANTHROPIC_API_KEY is set in your environment secrets.</div>
      <button class="btn" onclick="goTo(4)">← Back to validation</button>`;
  }
}

// ─── FEATURE 1: localStorage persistence ──────────────────────────────────────
function reloadLastOM(){
  try {
    const savedData   = localStorage.getItem('lastOMData');
    const savedInputs = localStorage.getItem('lastOMInputs');
    if(!savedData){ alert('No saved OM found.'); return; }
    omContent = JSON.parse(savedData);
    if(savedInputs) Object.assign(inputs, JSON.parse(savedInputs));
    stage = 5;
    render();
  } catch(e){ console.error('reloadLastOM failed:', e); }
}

function render(){
  renderStageBar();
  const content=document.getElementById("appContent");
  if(stage===5&&omContent){
    // Save to localStorage every time we display stage 5
    try {
      localStorage.setItem('lastOMData', JSON.stringify(omContent));
      localStorage.setItem('lastOMInputs', JSON.stringify(inputs));
      localStorage.setItem('lastOMTimestamp', new Date().toLocaleString());
    } catch(e){}

    // Build optional top bar: test badge (left) + reload button (right)
    const lastTs = localStorage.getItem('lastOMTimestamp');
    const testBadge = window.location.search.includes('test=true')
      ? `<span style="font-size:11px;font-family:'DM Sans',sans-serif;background:#c9a84c;color:#0a1628;border-radius:4px;padding:5px 12px;font-weight:600;letter-spacing:0.3px;">🧪 TEST MODE — No API calls used</span>`
      : `<span></span>`;
    const reloadBtn = lastTs
      ? `<button onclick="reloadLastOM()" style="font-size:11px;font-family:'DM Sans',sans-serif;padding:5px 14px;border:1px solid #0a1628;background:#c9a84c;color:#0a1628;border-radius:4px;cursor:pointer;font-weight:500;letter-spacing:0.3px;white-space:nowrap;">↺ Reload Last OM &nbsp;·&nbsp; saved ${lastTs}</button>`
      : `<span></span>`;

    content.innerHTML=`
      <div class="om-top-bar" style="display:flex;justify-content:space-between;align-items:center;padding:8px 0 14px;max-width:1056px;margin:0 auto;">
        ${testBadge}${reloadBtn}
      </div>
      ${renderOM()}`;
    return;
  }
  let inner="";
  if(stage===0)inner=s0();
  else if(stage===1)inner=s1();
  else if(stage===2)inner=s2();
  else if(stage===3)inner=s3();
  else if(stage===4)inner=s4();
  const nextLabel=stage===4?`Generate OM →`:`Continue →`;
  content.innerHTML=`${inner}<div class="nav"><button class="btn" onclick="goBack()" ${stage===0?"disabled":""}>← Back</button><button class="btn primary" onclick="goNext()">${nextLabel}</button></div>`;
  attachListeners();
  if(stage===0)renderTaggedImages();
}

function goTo(s){stage=s;render();}
function goBack(){if(stage>0){stage--;render();}}
function goNext(){console.log("goNext called, stage="+stage);
  if(stage===4){validate();if(errors.length>0){render();return;}generateOM();}
  else{stage++;render();}
}
