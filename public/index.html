<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OM Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#09090e;--surface:#111118;--surface2:#18181f;--border:#252530;--border2:#32323f;
    --gold:#c9a84c;--gold-dim:rgba(201,168,76,0.12);--gold-border:rgba(201,168,76,0.3);
    --text:#e8e4da;--text-2:#9990a0;--text-3:#555560;
    --success:#4a9e6a;--success-bg:rgba(74,158,106,0.08);--success-border:rgba(74,158,106,0.3);
    --warn:#c9a84c;--warn-bg:rgba(201,168,76,0.08);
    --err:#e06060;--err-bg:rgba(224,96,96,0.08);--err-border:rgba(224,96,96,0.3);
    --info:#6090d8;--info-bg:rgba(96,144,216,0.08);
    --red:#e05050;--orange:#d07030;--yellow:#c9a84c;--green:#4a9e6a;
    --radius:6px;--radius-lg:10px;
    --om-navy:#0a1628; --om-blue:#1e3a5f; --om-light-blue:#4a90d9;
    --om-gold:#c9a84c; --om-body:#1a1a2e; --om-gray:#6b7280;
    --om-light-gray:#f8f9fa; --om-border:#e5e7eb;
  }
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;}
  header{position:sticky;top:0;z-index:100;background:rgba(9,9,14,0.97);border-bottom:1px solid var(--border);padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:58px;backdrop-filter:blur(12px);}
  .brand-firm{font-size:10px;letter-spacing:4px;color:var(--text-3);text-transform:uppercase;}
  .brand-name{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;letter-spacing:1px;}
  .stage-bar{display:flex;align-items:center;gap:4px;overflow-x:auto;padding:2px 0;}
  .stage-pill{font-size:11px;padding:5px 14px;border-radius:20px;white-space:nowrap;border:1px solid var(--border);color:var(--text-3);transition:all 0.2s;}
  .stage-pill.active{background:var(--gold-dim);border-color:var(--gold-border);color:var(--gold);}
  .stage-pill.done{background:rgba(74,158,106,0.1);border-color:var(--success-border);color:var(--success);}
  .stage-sep{color:var(--text-3);font-size:10px;flex-shrink:0;}
  .container{max-width:900px;margin:0 auto;padding:40px 24px 80px;}
  .section-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin:32px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
  .section-label:first-child{margin-top:0;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
  .full{grid-column:1/-1;}
  .field{display:flex;flex-direction:column;gap:5px;}
  .field label{font-size:11px;color:var(--text-2);letter-spacing:0.5px;}
  .field input,.field select,.field textarea{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:9px 12px;width:100%;transition:border-color 0.2s;}
  .field select{background:var(--surface);}
  .field select option{background:#1a1a24;}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--gold);}
  .field textarea{resize:vertical;min-height:72px;}
  ::placeholder{color:var(--text-3);}
  .upload-zone{border:1px dashed var(--border2);border-radius:var(--radius-lg);padding:20px 24px;cursor:pointer;transition:all 0.2s;margin-bottom:10px;}
  .upload-zone:hover{border-color:var(--gold-border);background:var(--gold-dim);}
  .upload-zone.uploaded{border-color:var(--success-border);background:var(--success-bg);border-style:solid;}
  .upload-zone.error{border-color:var(--err-border);background:var(--err-bg);border-style:solid;}
  .tag{display:inline-block;font-size:11px;padding:3px 10px;border-radius:20px;margin:2px;background:var(--gold-dim);border:1px solid var(--gold-border);color:var(--gold);}
  .tag.success{background:var(--success-bg);border-color:var(--success-border);color:var(--success);}
  .val-item{display:flex;gap:12px;align-items:flex-start;padding:11px 14px;border-radius:var(--radius);margin-bottom:8px;font-size:13px;line-height:1.5;}
  .val-item.err{background:var(--err-bg);border:1px solid var(--err-border);color:#e8b0b0;}
  .val-item.warn{background:var(--warn-bg);border:1px solid var(--gold-border);color:#e8d09a;}
  .val-item.sugg{background:var(--surface2);border:1px solid var(--border);color:var(--text-2);}
  .val-item.ok{background:var(--success-bg);border:1px solid var(--success-border);color:#90d0a8;}
  .nav{display:flex;justify-content:space-between;align-items:center;margin-top:40px;padding-top:24px;border-top:1px solid var(--border);}
  .btn{font-family:'DM Sans',sans-serif;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;padding:11px 28px;border-radius:var(--radius);cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text-2);transition:all 0.2s;}
  .btn:hover:not(:disabled){background:var(--surface2);color:var(--text);}
  .btn:disabled{opacity:0.3;cursor:not-allowed;}
  .btn.primary{background:var(--gold);color:#09090e;border-color:var(--gold);font-weight:500;}
  .btn.primary:hover:not(:disabled){opacity:0.85;}
  .btn.outline-gold{border-color:var(--gold-border);color:var(--gold);}
  .btn.outline-gold:hover{background:var(--gold-dim);}
  .confirm-grid{border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:24px;}
  .confirm-row{display:flex;justify-content:space-between;gap:16px;padding:10px 16px;border-bottom:1px solid var(--border);}
  .confirm-row:last-child{border-bottom:none;}
  .confirm-row:nth-child(even){background:var(--surface);}
  .confirm-key{font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:1px;white-space:nowrap;margin-top:2px;}
  .confirm-val{font-size:13px;text-align:right;word-break:break-word;}
  .loading{text-align:center;padding:60px 24px;color:var(--text-2);}
  .spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:16px;}
  .loading-steps{margin-top:16px;display:flex;flex-direction:column;gap:8px;align-items:center;}
  .loading-step{font-size:12px;color:var(--text-3);padding:4px 12px;border-radius:20px;border:1px solid var(--border);}
  .loading-step.active{color:var(--gold);border-color:var(--gold-border);background:var(--gold-dim);}
  .loading-step.done{color:var(--success);border-color:var(--success-border);background:var(--success-bg);}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* OM STYLES (dark theme — stage 1-5 UI) */
  .om-page{border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:8px;overflow:hidden;}
  .om-page-header{padding:16px 28px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:baseline;gap:12px;}
  .om-section-num{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--text-3);}
  .om-section-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:400;}
  .om-page-body{padding:24px 28px;}
  .om-cover{background:linear-gradient(150deg,var(--surface) 0%,#16120a 100%);border:1px solid var(--border);border-radius:var(--radius-lg);padding:48px;margin-bottom:8px;position:relative;overflow:hidden;}
  .om-cover::before{content:'';position:absolute;top:-60px;right:-60px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,0.06) 0%,transparent 70%);}
  .om-cover-eyebrow{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--text-3);margin-bottom:12px;}
  .om-cover-title{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:400;line-height:1.15;margin-bottom:10px;}
  .om-cover-tagline{font-size:15px;color:var(--gold);margin-bottom:8px;font-style:italic;}
  .om-cover-address{font-size:13px;color:var(--text-2);margin-bottom:32px;}
  .om-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .om-kpi{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;}
  .om-kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--text-3);margin-bottom:5px;}
  .om-kpi-val{font-size:20px;font-weight:300;font-family:'Cormorant Garamond',serif;color:var(--gold);}
  .om-fin-block{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px;}
  .om-fin-row{display:flex;justify-content:space-between;padding:9px 14px;border-bottom:1px solid var(--border);font-size:13px;}
  .om-fin-row:last-child{border-bottom:none;}
  .om-fin-row:nth-child(even){background:var(--surface);}
  .om-fin-label{color:var(--text-2);text-transform:uppercase;font-size:11px;letter-spacing:1px;margin-top:1px;}
  .om-fin-val{font-weight:500;font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--gold);}
  .om-highlights{list-style:none;display:flex;flex-direction:column;gap:10px;}
  .om-highlight{display:flex;gap:14px;align-items:flex-start;}
  .om-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);flex-shrink:0;margin-top:9px;}
  .heat-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:16px;}
  .heat-table th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--text-3);padding:8px 10px;border-bottom:1px solid var(--border);}
  .heat-table td{padding:10px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.5;}
  .heat-table tr:last-child td{border-bottom:none;}
  .priority-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;letter-spacing:0.5px;}
  .priority-red{background:rgba(224,80,80,0.15);color:#e08080;border:1px solid rgba(224,80,80,0.3);}
  .priority-orange{background:rgba(208,112,48,0.15);color:#d09060;border:1px solid rgba(208,112,48,0.3);}
  .priority-yellow{background:rgba(201,168,76,0.15);color:var(--gold);border:1px solid var(--gold-border);}
  .priority-green{background:var(--success-bg);color:var(--success);border:1px solid var(--success-border);}
  .data-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-top:12px;}
  .data-card-title{font-size:10px;text-transform:uppercase;letter-spacing:3px;color:var(--gold);margin-bottom:10px;}
  .data-grid{display:flex;flex-wrap:wrap;gap:16px;}
  .data-item-label{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;}
  .data-item-val{font-size:14px;font-family:'Cormorant Garamond',serif;color:var(--text);}
  .acre-badge{display:inline-block;font-size:9px;padding:2px 6px;border-radius:3px;background:var(--gold-dim);border:1px solid var(--gold-border);color:var(--gold);letter-spacing:1px;text-transform:uppercase;vertical-align:middle;margin-left:6px;}
  .rate-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px;}
  .rate-cell{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;text-align:center;}
  .rate-cell-label{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
  .rate-cell-val{font-size:16px;font-family:'Cormorant Garamond',serif;color:var(--gold);}
  .prop-chips{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:16px;}
  .chip{padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);}
  .chip-label{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--text-3);margin-bottom:3px;}
  .chip-val{font-size:13px;}
  .img-gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px;}
  .img-gallery img{width:100%;height:140px;object-fit:cover;border-radius:var(--radius);border:1px solid var(--border);}
  .om-footer{font-size:11px;color:var(--text-3);text-align:center;margin-top:24px;padding-top:20px;border-top:1px solid var(--border);line-height:1.7;}
  .om-actions{display:flex;justify-content:center;gap:12px;margin-top:32px;}
  .source-note{font-size:11px;color:var(--text-3);font-style:italic;margin-top:8px;}
  .page-sub{font-size:11px;color:var(--text-3);letter-spacing:1px;margin-left:4px;}

  /* Image upload zone */
  .img-upload-zone{border:1px dashed var(--border2);border-radius:var(--radius);padding:14px 18px;cursor:pointer;text-align:center;margin-top:8px;transition:all 0.2s;display:inline-flex;align-items:center;gap:8px;}
  .img-upload-zone:hover{border-color:var(--gold-border);background:var(--gold-dim);}

  /* Tagged image cards */
  .tagged-img-list{display:flex;flex-direction:column;gap:10px;margin-top:12px;}
  .tagged-img-card{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;}
  .tagged-img-thumb{width:80px;height:60px;object-fit:cover;border-radius:4px;border:1px solid var(--border);flex-shrink:0;}
  .tagged-img-info{flex:1;min-width:0;}
  .tagged-img-name{font-size:11px;color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px;}
  .tagged-img-select{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:12px;padding:5px 8px;border-radius:4px;cursor:pointer;}
  .tagged-img-select:focus{outline:none;border-color:var(--gold);}
  .tagged-img-remove{background:none;border:none;color:var(--text-3);cursor:pointer;font-size:16px;padding:4px 6px;flex-shrink:0;transition:color 0.15s;}
  .tagged-img-remove:hover{color:var(--err);}

  /* ══ OM PREVIEW LIGHT THEME — LANDSCAPE LETTER (1056×816px) ══ */
  .om-preview { font-family:'DM Sans',sans-serif; color:var(--om-body); }

  /* Page shell — US Letter landscape at 96dpi */
  .om-section {
    background:#fff;
    width:1056px;
    min-height:816px;
    max-height:816px;
    overflow:hidden;
    box-sizing:border-box;
    margin:0 auto 16px;
    box-shadow:0 2px 20px rgba(0,0,0,0.07);
    display:flex;
    flex-direction:column;
  }
  .om-section:first-child { margin-top:0; }

  /* Section header — 56px tall */
  .om-sec-header { padding:14px 40px; background:var(--om-navy); display:flex; align-items:baseline; gap:14px; border-bottom:3px solid var(--om-gold); flex-shrink:0; min-height:56px; box-sizing:border-box; }
  .om-sec-eye { font-size:9px; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,0.45); }
  .om-sec-title { font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:700; color:#fff; }
  .om-sec-sub { font-size:10px; color:rgba(255,255,255,0.35); letter-spacing:1px; margin-left:auto; }

  /* Section body — fills all space between header and footer */
  .om-sec-body { padding:24px 40px; flex:1; overflow:hidden; box-sizing:border-box; }

  /* Section footer — 36px, pinned to bottom */
  .om-sec-footer { display:flex; justify-content:space-between; padding:8px 40px; border-top:2px solid var(--om-navy); background:var(--om-light-gray); font-size:9px; color:var(--om-gray); letter-spacing:0.5px; text-transform:uppercase; flex-shrink:0; height:36px; box-sizing:border-box; margin-top:auto; }

  /* Body text */
  .om-prose { font-size:14px; line-height:1.7; color:#374151; }
  .om-prose + .om-prose { margin-top:10px; }

  /* Metric cards */
  .om-metric-grid { display:grid; gap:8px; }
  .om-metric-card { background:var(--om-navy); padding:14px 16px; border-radius:4px; border-left:3px solid var(--om-light-blue); }
  .om-metric-label { font-size:9px; text-transform:uppercase; letter-spacing:2px; color:rgba(255,255,255,0.5); margin-bottom:4px; }
  .om-metric-val { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:300; color:var(--om-light-blue); line-height:1.1; }

  /* KPI cards (cover) */
  .om-kpi-row { display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:var(--om-border); border:1px solid var(--om-border); border-radius:4px; overflow:hidden; margin-top:20px; }
  .om-kpi-cell { background:#fff; padding:14px 16px; }
  .om-kpi-label { font-size:9px; text-transform:uppercase; letter-spacing:2px; color:var(--om-gray); margin-bottom:4px; }
  .om-kpi-val { font-family:'Cormorant Garamond',serif; font-size:24px; font-weight:400; color:var(--om-navy); }

  /* Cover — hero image 500px, body flex:1, footer pinned */
  .om-cover-photo { width:100%; height:500px; object-fit:cover; display:block; flex-shrink:0; }
  .om-cover-photo-placeholder { width:100%; height:500px; background:linear-gradient(135deg,var(--om-navy) 0%,var(--om-blue) 100%); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .om-cover-gold-bar { height:4px; background:linear-gradient(90deg,var(--om-gold),var(--om-light-blue)); flex-shrink:0; }
  .om-cover-body { padding:24px 48px 16px; flex:1; overflow:hidden; display:flex; flex-direction:column; justify-content:center; }
  .om-cover-eyebrow { font-size:9px; letter-spacing:4px; text-transform:uppercase; color:var(--om-gray); margin-bottom:8px; }
  .om-cover-name { font-family:'Cormorant Garamond',serif; font-size:40px; font-weight:700; color:var(--om-navy); line-height:1.05; margin-bottom:6px; }
  .om-cover-tagline { font-family:'Cormorant Garamond',serif; font-size:17px; font-style:italic; color:var(--om-light-blue); margin-bottom:4px; }
  .om-cover-address { font-size:12px; color:var(--om-gray); }
  .om-cover-footer { display:flex; justify-content:space-between; align-items:center; padding:10px 48px; border-top:1px solid var(--om-border); flex-shrink:0; height:40px; box-sizing:border-box; margin-top:auto; }
  .om-cover-broker { font-size:11px; color:var(--om-gray); }
  .om-cover-conf { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--om-gray); }

  /* Section images — 200px in landscape (leaves room for content) */
  .om-section-photo { width:100%; height:200px; object-fit:cover; display:block; flex-shrink:0; }
  .om-section-photo-placeholder { width:100%; height:0; }
  .om-gallery-img { width:100%; height:190px; object-fit:cover; border-radius:4px; }
  .om-sponsor-logo { max-height:72px; max-width:180px; object-fit:contain; display:block; margin-bottom:12px; }

  /* Two-column layout — flex for landscape */
  .om-cols { display:flex; gap:32px; }
  .om-cols-4060 > *:first-child { flex:0 0 38%; }
  .om-cols-4060 > *:last-child  { flex:1; }
  .om-cols-6040 > *:first-child { flex:1; }
  .om-cols-6040 > *:last-child  { flex:0 0 38%; }
  .om-cols-5050 > * { flex:1; }

  /* Timeline bar */
  .om-timeline { display:flex; align-items:center; margin-top:20px; padding-top:16px; border-top:1px solid var(--om-border); }
  .om-timeline-dot { width:12px; height:12px; border-radius:50%; background:var(--om-gold); flex-shrink:0; position:relative; z-index:1; }
  .om-timeline-line { flex:1; height:2px; background:var(--om-border); }
  .om-timeline-label { text-align:center; min-width:80px; }
  .om-timeline-year { font-family:'Cormorant Garamond',serif; font-size:17px; font-weight:600; color:var(--om-navy); display:block; }
  .om-timeline-desc { font-size:10px; color:var(--om-gray); text-transform:uppercase; letter-spacing:1px; }
  .om-timeline-node { display:flex; flex-direction:column; align-items:center; gap:5px; }

  /* Highlight cards — 3 columns in landscape width, fill page height */
  .om-highlight-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; flex:1; }
  .om-highlight-card { border:1px solid var(--om-border); border-radius:4px; padding:24px 22px; border-top:3px solid var(--om-light-blue); display:flex; flex-direction:column; }
  .om-highlight-title { font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:700; color:var(--om-navy); margin-bottom:8px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .om-highlight-body { font-size:13px; color:#4b5563; line-height:1.6; flex:1; }
  .om-highlight-source { font-size:10px; color:var(--om-gold); font-style:italic; margin-top:10px; }

  /* Financing loan cards — 4 per row in landscape */
  .om-loan-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:20px; }
  .om-loan-card { padding:14px 16px; border:1px solid var(--om-border); border-radius:4px; background:var(--om-light-gray); }
  .om-loan-card-label { font-size:9px; text-transform:uppercase; letter-spacing:2px; color:var(--om-gray); margin-bottom:4px; }
  .om-loan-card-val { font-family:'Cormorant Garamond',serif; font-size:19px; color:var(--om-navy); font-weight:600; }

  /* S02 P1 redesign — Option A: hero → stack → math → terms → narrative */
  .fin-hero { display:grid; grid-template-columns:1fr 1fr 1fr; gap:0; border:1px solid var(--om-border); border-radius:6px; overflow:hidden; background:#fff; }
  .fin-hero-cell { padding:22px 28px; position:relative; border-right:1px solid var(--om-border); display:flex; flex-direction:column; justify-content:space-between; }
  .fin-hero-cell:last-child { border-right:none; }
  .fin-hero-cell::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--om-gold); }
  .fin-hero-label { font-size:9px; letter-spacing:2.5px; text-transform:uppercase; color:var(--om-gray); margin-bottom:0; }
  .fin-hero-val { font-family:'Cormorant Garamond',serif; font-size:34px; font-weight:600; color:var(--om-navy); line-height:1.05; letter-spacing:-0.5px; font-variant-numeric: lining-nums tabular-nums; }
  .fin-hero-sub { font-size:10.5px; color:var(--om-gray); margin-top:0; }

  .fin-stack { margin-top:20px; }
  .fin-stack-label { display:flex; justify-content:space-between; align-items:baseline; font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--om-gray); margin-bottom:8px; }
  .fin-stack-bar { height:36px; display:flex; border-radius:4px; overflow:hidden; border:1px solid var(--om-border); }
  .fin-stack-debt { background:var(--om-navy); color:#fff; display:flex; align-items:center; justify-content:space-between; padding:0 16px; font-size:12px; font-weight:600; letter-spacing:0.3px; }
  .fin-stack-equity { background:var(--om-light-blue); color:#fff; display:flex; align-items:center; justify-content:space-between; padding:0 16px; font-size:12px; font-weight:600; letter-spacing:0.3px; }
  .fin-stack-tier-label { opacity:0.85; font-weight:500; }

  .fin-math { margin-top:20px; display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
  .fin-math-card { padding:16px 18px; border:1px solid var(--om-border); border-radius:4px; background:#fff; border-left:3px solid var(--om-light-blue); }
  .fin-math-label { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--om-gray); margin-bottom:6px; }
  .fin-math-val { font-family:'Cormorant Garamond',serif; font-size:24px; font-weight:600; color:var(--om-navy); line-height:1.1; font-variant-numeric: lining-nums tabular-nums; }
  .fin-math-sub { font-size:10px; color:var(--om-gray); margin-top:4px; font-style:italic; }

  .fin-terms { margin-top:22px; display:grid; grid-template-columns:1fr 1fr; column-gap:36px; row-gap:0; border-top:1px solid var(--om-border); padding-top:8px; }
  .fin-term-row { display:flex; justify-content:space-between; align-items:baseline; padding:10px 0; border-bottom:1px solid var(--om-border); font-size:12px; }
  .fin-term-label { color:var(--om-gray); text-transform:uppercase; letter-spacing:1px; font-size:10px; }
  .fin-term-val { color:var(--om-navy); font-weight:500; }

  .fin-narrative { margin-top:22px; font-size:12.5px; line-height:1.7; color:#374151; }
  .fin-narrative + .fin-narrative { margin-top:8px; }

  /* S02 P2 — Sensitivity & Stress Tests */
  .fin-ss-title { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px; }
  .fin-ss-chart-title { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--om-gray); }
  .fin-ss-hint { font-size:10px; color:var(--om-gold); font-style:italic; }
  .fin-ss-table { width:100%; border-collapse:separate; border-spacing:0; font-size:12px; }
  .fin-ss-table th { background:var(--om-navy); color:rgba(255,255,255,0.85); font-size:9px; letter-spacing:1.5px; text-transform:uppercase; font-weight:500; padding:10px 8px; text-align:center; border:1px solid var(--om-navy); }
  .fin-ss-table th:first-child { background:transparent; color:var(--om-gray); border:none; width:10%; }
  .fin-ss-table th.base { background:var(--om-blue); border-color:var(--om-blue); color:#fff; }
  .fin-ss-table th .rate-num { display:block; font-size:8.5px; font-weight:400; opacity:0.75; margin-top:1px; }
  .fin-ss-table td.row-label { font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--om-gray); text-align:right; padding:10px 14px 10px 0; border:none; background:transparent; font-weight:500; }
  .fin-ss-table td.row-label.base-row { color:var(--om-navy); font-weight:600; }
  .fin-ss-table td.dscr-cell { font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:600; text-align:center; padding:7px 8px; border:1px solid #fff; }
  .fin-ss-table tr.base-noi td.dscr-cell { border-top:2px solid var(--om-gold); border-bottom:2px solid var(--om-gold); }
  .fin-ss-table tr.base-noi td.dscr-cell.base-col { border:2px solid var(--om-gold); }
  .fin-ss-table .dscr-green  { background:rgba(74,158,106,0.20); color:#1f6b3e; }
  .fin-ss-table .dscr-yellow { background:rgba(201,168,76,0.22); color:#7a6418; }
  .fin-ss-table .dscr-orange { background:rgba(208,112,48,0.22); color:#8a4318; }
  .fin-ss-table .dscr-red    { background:rgba(224,80,80,0.22); color:#8a2828; }
  .fin-ss-legend { display:flex; gap:14px; margin-top:8px; font-size:9.5px; color:var(--om-gray); letter-spacing:0.5px; justify-content:center; }
  .fin-ss-legend-item { display:flex; align-items:center; gap:5px; }
  .fin-ss-legend-dot { width:10px; height:10px; border-radius:2px; }
  .fin-be-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:14px; }
  .fin-be-card { padding:12px 16px; border:1px solid var(--om-border); border-radius:4px; background:#fff; border-left:3px solid var(--om-gold); display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
  .fin-be-label { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--om-gray); margin-bottom:4px; }
  .fin-be-val { font-family:'Cormorant Garamond',serif; font-size:24px; font-weight:600; color:var(--om-navy); line-height:1.1; font-variant-numeric: lining-nums tabular-nums; }
  .fin-be-sub { font-size:10.5px; color:var(--om-gray); margin-top:3px; font-style:italic; }
  .fin-refi { margin-top:14px; border-top:1px solid var(--om-border); padding-top:10px; }
  .fin-refi-title { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--om-gray); margin-bottom:8px; }
  .fin-refi-table { width:100%; border-collapse:collapse; font-size:12.5px; }
  .fin-refi-table thead th { font-size:9px; letter-spacing:2px; text-transform:uppercase; padding:6px 14px; }
  .fin-refi-table thead th:first-child { text-align:left; color:var(--om-gray); }
  .fin-refi-table thead th.scenario-base { background:rgba(74,158,106,0.10); color:#1f6b3e; text-align:right; border-bottom:2px solid rgba(74,158,106,0.4); }
  .fin-refi-table thead th.scenario-stress { background:rgba(208,112,48,0.10); color:#8a4318; text-align:right; border-bottom:2px solid rgba(208,112,48,0.4); }
  .fin-refi-table td { padding:6px 14px; border-bottom:1px solid var(--om-border); }
  .fin-refi-table td.metric-label { color:var(--om-gray); font-size:11px; letter-spacing:0.5px; }
  .fin-refi-table td.metric-val { font-family:'Cormorant Garamond',serif; font-size:15px; font-weight:600; text-align:right; color:var(--om-navy); }
  .fin-refi-table td.cash-pos { color:#1f6b3e; }
  .fin-refi-table tr:last-child td { border-bottom:none; }
  .fin-refi-table tr.highlight td { background:var(--om-light-gray); }
  .fin-refi-table tr.highlight td.metric-label { font-weight:600; color:var(--om-navy); }

  /* ────────────────────────────────────────────────────────── */
  /* S06 P1 — Trade Area & Drive-Time Access                   */
  /* ────────────────────────────────────────────────────────── */
  .loc-iso-body { display:grid; grid-template-columns:1fr 320px; flex:1; min-height:0; }
  .loc-iso-map { background:#fafbfc; position:relative; overflow:hidden; padding:18px; }
  .loc-iso-map svg { display:block; width:100%; height:100%; }
  .loc-iso-map-title { position:absolute; top:18px; left:24px; font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--om-gray); z-index:5; background:rgba(255,255,255,0.92); padding:5px 10px; border-radius:3px; }
  .loc-iso-legend { position:absolute; bottom:18px; right:18px; z-index:5; background:rgba(255,255,255,0.95); border:1px solid var(--om-border); border-radius:4px; padding:10px 14px; min-width:160px; }
  .loc-iso-legend-title { font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:var(--om-gray); margin-bottom:6px; font-weight:600; }
  .loc-iso-legend-row { display:flex; align-items:center; gap:8px; font-size:10.5px; color:var(--om-navy); padding:3px 0; }
  .loc-iso-legend-dot { width:14px; height:14px; border-radius:50%; flex-shrink:0; }
  .loc-iso-side { background:var(--om-light-gray); border-left:1px solid var(--om-border); padding:18px 22px; display:flex; flex-direction:column; gap:12px; overflow:hidden; }
  .loc-iso-side-title { font-size:9px; letter-spacing:2.5px; text-transform:uppercase; color:var(--om-gold); font-weight:600; padding-bottom:6px; border-bottom:1px solid var(--om-border); }
  .loc-ring-row { background:#fff; border-radius:4px; padding:11px 14px; border-left:3px solid var(--om-gray); }
  .loc-ring-row.r1 { border-left-color:#c9a84c; }
  .loc-ring-row.r3 { border-left-color:#1e3a5f; }
  .loc-ring-row.r5 { border-left-color:#4a90d9; }
  .loc-ring-header { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:6px; }
  .loc-ring-label { font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:700; color:var(--om-navy); }
  .loc-ring-radius { font-size:9px; letter-spacing:1px; text-transform:uppercase; font-weight:600; color:var(--om-gray); }
  .loc-ring-row.r1 .loc-ring-radius { color:#a07828; }
  .loc-ring-row.r3 .loc-ring-radius { color:#1e3a5f; }
  .loc-ring-row.r5 .loc-ring-radius { color:#4a90d9; }
  .loc-ring-stats { display:grid; grid-template-columns:1fr 1fr; gap:5px 14px; }
  .loc-ring-stat-label { font-size:9px; letter-spacing:1px; text-transform:uppercase; color:var(--om-gray); }
  .loc-ring-stat-val { font-size:13px; color:var(--om-navy); font-weight:600; }
  .loc-callout { background:var(--om-navy); color:#fff; padding:12px 14px; border-radius:4px; font-size:11px; line-height:1.55; border-left:3px solid var(--om-gold); }
  .loc-callout strong { color:var(--om-gold); font-weight:600; }

  /* ────────────────────────────────────────────────────────── */
  /* S06 P2 — Walking Distance & Connectivity                   */
  /* ────────────────────────────────────────────────────────── */
  .loc-score-strip { height:120px; background:var(--om-navy); display:grid; grid-template-columns:repeat(3,1fr); flex-shrink:0; }
  .loc-score-cell { padding:20px 32px; display:flex; flex-direction:column; justify-content:center; border-right:1px solid rgba(255,255,255,0.1); }
  .loc-score-cell:last-child { border-right:none; }
  .loc-score-label { font-size:9px; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,0.6); margin-bottom:4px; }
  .loc-score-row { display:flex; align-items:baseline; gap:14px; }
  .loc-score-val { font-family:'Cormorant Garamond',serif; font-size:48px; font-weight:600; color:var(--om-gold); line-height:1; }
  .loc-score-bar { flex:1; height:8px; background:rgba(255,255,255,0.1); border-radius:4px; overflow:hidden; }
  .loc-score-bar-fill { height:100%; background:var(--om-gold); border-radius:4px; }
  .loc-score-rank { font-size:10px; color:rgba(255,255,255,0.55); margin-top:6px; }
  .loc-quads { flex:1; display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--om-border); min-height:0; }
  .loc-quad { background:#fff; padding:16px 22px; display:flex; flex-direction:column; gap:8px; overflow:hidden; }
  .loc-quad-header { display:flex; align-items:center; gap:10px; padding-bottom:6px; border-bottom:2px solid currentColor; }
  .loc-quad.q-retail    .loc-quad-header { color:#c9a84c; }
  .loc-quad.q-employer  .loc-quad-header { color:#1e3a5f; }
  .loc-quad.q-education .loc-quad-header { color:#4a90d9; }
  .loc-quad.q-transit   .loc-quad-header { color:#4a9e6a; }
  .loc-quad-icon { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-size:13px; font-weight:700; flex-shrink:0; }
  .loc-quad.q-retail    .loc-quad-icon { background:#c9a84c; }
  .loc-quad.q-employer  .loc-quad-icon { background:#1e3a5f; }
  .loc-quad.q-education .loc-quad-icon { background:#4a90d9; }
  .loc-quad.q-transit   .loc-quad-icon { background:#4a9e6a; }
  .loc-quad-title { font-family:'Cormorant Garamond',serif; font-size:17px; font-weight:700; color:var(--om-navy); }
  .loc-quad-sub { font-size:9.5px; color:var(--om-gray); letter-spacing:1px; text-transform:uppercase; margin-left:auto; font-weight:500; }
  .loc-quad-list { display:flex; flex-direction:column; gap:4px; }
  .loc-quad-item { display:flex; align-items:baseline; gap:8px; font-size:11.5px; padding:4px 0; border-bottom:1px dotted var(--om-border); }
  .loc-quad-item:last-child { border-bottom:none; }
  .loc-quad-item-name { flex:1; color:var(--om-body); line-height:1.4; }
  .loc-quad-item-name strong { font-weight:600; color:var(--om-navy); }
  .loc-quad-item-meta { font-size:10px; color:var(--om-gray); white-space:nowrap; letter-spacing:0.3px; flex-shrink:0; }
  .loc-quad.q-retail    .loc-quad-item-meta b { color:#a07828; }
  .loc-quad.q-employer  .loc-quad-item-meta b { color:#1e3a5f; }
  .loc-quad.q-education .loc-quad-item-meta b { color:#4a90d9; }
  .loc-quad.q-transit   .loc-quad-item-meta b { color:#3a7e54; }
  .loc-quad-empty { font-size:11px; color:var(--om-gray); font-style:italic; padding:8px 4px; }

  /* ─── Market Overview P1 — Submarket Strength Scorecard ──────────── */
  .p1-hero { background:linear-gradient(135deg,var(--om-navy) 0%,#102540 100%); color:#fff; padding:12px 40px; display:grid; grid-template-columns:190px 1fr; gap:26px; align-items:center; flex-shrink:0; min-height:88px; border-bottom:1px solid rgba(201,168,76,0.25); }
  .p1-hero-stat { text-align:center; }
  .p1-hero-stat-num { font-family:'Cormorant Garamond',serif; font-size:54px; font-weight:600; color:var(--om-gold); line-height:0.95; letter-spacing:-1px; }
  .p1-hero-stat-sup { font-family:'Cormorant Garamond',serif; font-size:16px; font-weight:500; color:var(--om-gold); vertical-align:super; margin-left:2px; }
  .p1-hero-stat-label { font-size:8.5px; letter-spacing:2.5px; text-transform:uppercase; color:rgba(255,255,255,0.6); margin-top:4px; }
  .p1-hero-narrative { border-left:1px solid rgba(255,255,255,0.15); padding:0 24px; }
  .p1-hero-eyebrow { font-size:9px; letter-spacing:2.5px; text-transform:uppercase; color:var(--om-gold); margin-bottom:4px; font-weight:600; }
  .p1-hero-headline { font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:600; line-height:1.25; margin-bottom:5px; }
  .p1-hero-sub { font-size:10.5px; line-height:1.5; color:rgba(255,255,255,0.7); }
  .p1-macro-chip { display:flex; flex-direction:column; gap:8px; align-items:flex-start; }
  .p1-chip { display:inline-block; padding:4px 12px; border-radius:3px; font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase; }
  .p1-chip.favorable { background:rgba(74,158,106,0.18); color:#7fc99a; border:1px solid rgba(74,158,106,0.5); }
  .p1-chip.neutral   { background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.7); border:1px solid rgba(255,255,255,0.2); }
  .p1-chip.cautious  { background:rgba(192,57,43,0.18); color:#e88c80; border:1px solid rgba(192,57,43,0.5); }
  .p1-signals { font-size:10.5px; color:rgba(255,255,255,0.6); line-height:1.5; }
  .p1-signals strong { color:var(--om-gold); font-weight:600; }
  .p1-grid { flex:1; display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; gap:1px; background:var(--om-border); }
  .p1-quad { background:#fff; padding:14px 24px 12px; display:flex; flex-direction:column; gap:4px; overflow:hidden; }
  .p1-quad-header { display:flex; align-items:center; gap:10px; padding-bottom:8px; border-bottom:2px solid var(--cat); margin-bottom:6px; }
  .p1-quad-icon { width:30px; height:30px; border-radius:50%; background:var(--cat); display:flex; align-items:center; justify-content:center; color:#fff; font-size:13px; font-weight:700; }
  .p1-quad-title { font-family:'Cormorant Garamond',serif; font-size:17px; font-weight:700; color:var(--om-navy); flex:1; }
  .p1-quad-source { font-size:8.5px; letter-spacing:1.5px; text-transform:uppercase; color:var(--om-gray); font-weight:500; }
  .p1-q-demo   { --cat:var(--om-gold); }
  .p1-q-emp    { --cat:var(--om-blue); }
  .p1-q-supply { --cat:#4a9e6a; }
  .p1-q-macro  { --cat:var(--om-light-blue); }
  .p1-metric { display:grid; grid-template-columns:1fr auto; gap:3px 14px; align-items:baseline; padding:4px 0; }
  .p1-metric-label { font-size:11.5px; color:var(--om-body); font-weight:500; }
  .p1-metric-val { font-size:13px; color:var(--om-navy); font-weight:700; font-variant-numeric:tabular-nums; white-space:nowrap; }
  .p1-bar-row { grid-column:1/-1; display:grid; grid-template-columns:1fr auto; gap:14px; align-items:center; }
  .p1-bar { display:flex; gap:2px; height:8px; }
  .p1-seg { flex:1; background:#e6e9ee; border-radius:1px; }
  .p1-seg.on { background:var(--cat); }
  .p1-rank { font-size:10px; color:var(--om-gray); font-weight:600; font-variant-numeric:tabular-nums; min-width:62px; text-align:right; letter-spacing:0.3px; }
  .p1-rank b { color:var(--cat); font-size:11.5px; font-weight:700; }
  .p1-inv-arrow { color:#4a9e6a; font-size:11px; margin-left:3px; }
  .p1-quad-takeaway { margin-top:auto; padding-top:6px; border-top:1px dotted var(--om-border); font-size:10px; line-height:1.45; color:var(--om-gray); font-style:italic; overflow:hidden; }
  .p1-quad-takeaway strong { color:var(--om-navy); font-weight:600; font-style:normal; }

  /* ─── Market Overview P2 — Supply Collapse + Employment Engine ─────── */
  .p2-body { flex:1; display:flex; flex-direction:column; padding:0 0 22px; }
  .p2-narrative-strip { padding:14px 40px 10px; background:var(--om-light-gray); border-bottom:1px solid var(--om-border); display:grid; grid-template-columns:1fr auto; gap:24px; align-items:center; }
  .p2-narrative { font-size:11.5px; line-height:1.55; color:var(--om-body); max-width:660px; }
  .p2-narrative strong { color:var(--om-navy); font-weight:600; }
  .p2-stat-stack { display:flex; gap:18px; }
  .p2-mini-stat { text-align:right; }
  .p2-mini-stat-val { font-family:'Cormorant Garamond',serif; font-size:30px; font-weight:600; color:var(--om-navy); line-height:1; }
  .p2-mini-stat-val.gold { color:var(--om-gold); }
  .p2-mini-stat-val.red  { color:#c0392b; }
  .p2-mini-stat-label { font-size:8.5px; letter-spacing:1.5px; text-transform:uppercase; color:var(--om-gray); margin-top:4px; }
  .p2-section { padding:14px 40px 8px; display:grid; grid-template-columns:1fr; gap:8px; border-bottom:1px solid var(--om-border); }
  .p2-section:last-of-type { border-bottom:none; }
  .p2-section-head { display:flex; align-items:baseline; gap:10px; margin-bottom:2px; }
  .p2-section-title { font-family:'Cormorant Garamond',serif; font-size:16px; font-weight:700; color:var(--om-navy); }
  .p2-section-sub { font-size:10px; color:var(--om-gray); letter-spacing:1px; text-transform:uppercase; }
  .p2-section-source { margin-left:auto; font-size:8.5px; letter-spacing:1.5px; text-transform:uppercase; color:var(--om-gray); font-weight:500; }
  .p2-chart { background:#fafbfc; border:1px solid var(--om-border); border-radius:3px; }
  .p2-chart svg { display:block; width:100%; height:100%; }
  .p2-emp-grid { display:grid; grid-template-columns:1fr 360px; gap:18px; align-items:stretch; flex:1; min-height:0; }
  .p2-sectors { display:flex; flex-direction:column; gap:0; background:#fafbfc; border:1px solid var(--om-border); border-radius:3px; padding:10px 14px; }
  .p2-sectors-head { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--om-gray); font-weight:600; padding-bottom:6px; border-bottom:1px solid var(--om-border); margin-bottom:6px; }
  .p2-sector-row { display:grid; grid-template-columns:18px 1fr auto; gap:8px; align-items:center; padding:5px 0; font-size:11px; }
  .p2-sector-row + .p2-sector-row { border-top:1px dotted var(--om-border); }
  .p2-sector-rank { font-family:'Cormorant Garamond',serif; font-size:14px; font-weight:600; color:var(--om-gold); text-align:center; }
  .p2-sector-name { color:var(--om-body); font-weight:500; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-size:10.5px; }
  .p2-sector-bar-wrap { grid-column:2/-1; height:4px; background:#e6e9ee; border-radius:2px; overflow:hidden; margin-top:3px; }
  .p2-sector-bar-fill { height:100%; background:var(--om-blue); }
  .p2-sector-val { font-size:11px; font-weight:700; color:var(--om-navy); font-variant-numeric:tabular-nums; }

  /* Risk table */
  .om-risk-table { width:100%; border-collapse:collapse; font-size:12px; margin-top:16px; }
  .om-risk-table th { text-align:left; font-size:9px; text-transform:uppercase; letter-spacing:2px; color:#fff; padding:10px 12px; background:var(--om-navy); }
  .om-risk-table td { padding:10px 12px; border-bottom:1px solid var(--om-border); vertical-align:top; line-height:1.45; }
  .om-risk-table tr:nth-child(even) td { background:var(--om-light-gray); }
  .om-risk-table tr:last-child td { border-bottom:none; }

  /* Priority badges */
  .pri-red { display:inline-block; font-size:10px; padding:2px 8px; border-radius:20px; background:rgba(224,80,80,0.12); color:#c53030; border:1px solid rgba(224,80,80,0.3); font-weight:600; }
  .pri-orange { display:inline-block; font-size:10px; padding:2px 8px; border-radius:20px; background:rgba(208,112,48,0.12); color:#c05020; border:1px solid rgba(208,112,48,0.3); font-weight:600; }
  .pri-yellow { display:inline-block; font-size:10px; padding:2px 8px; border-radius:20px; background:rgba(201,168,76,0.12); color:#a07828; border:1px solid rgba(201,168,76,0.3); font-weight:600; }
  .pri-green { display:inline-block; font-size:10px; padding:2px 8px; border-radius:20px; background:rgba(74,158,106,0.12); color:#276749; border:1px solid rgba(74,158,106,0.3); font-weight:600; }

  /* Prop spec chips — 2 cols */
  .om-spec-chips { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
  .om-spec-chip { padding:9px 12px; border:1px solid var(--om-border); border-radius:4px; background:var(--om-light-gray); }
  .om-spec-chip-label { font-size:9px; text-transform:uppercase; letter-spacing:2px; color:var(--om-gray); margin-bottom:2px; }
  .om-spec-chip-val { font-size:13px; color:var(--om-navy); font-weight:500; }

  /* Demographics grid — 3 cols, compact for landscape */
  .om-demo-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-top:14px; }
  .om-demo-item { padding:14px; border:1px solid var(--om-border); border-radius:4px; border-top:3px solid var(--om-light-blue); }
  .om-demo-val { font-family:'Cormorant Garamond',serif; font-size:26px; font-weight:300; color:var(--om-light-blue); line-height:1; margin-bottom:4px; }
  .om-demo-label { font-size:11px; color:var(--om-navy); font-weight:500; margin-bottom:2px; }
  .om-demo-source { font-size:10px; color:var(--om-gold); font-style:italic; }

  /* Finance table — tighter rows for landscape */
  .om-fin-table { width:100%; border-collapse:collapse; font-size:12.5px; }
  .om-fin-table .section-header td { background:var(--om-navy); color:#fff; font-size:9px; text-transform:uppercase; letter-spacing:2px; padding:8px 12px; font-weight:500; }
  .om-fin-table tr td { padding:7px 12px; border-bottom:1px solid var(--om-border); }
  .om-fin-table tr:nth-child(even) td { background:var(--om-light-gray); }
  .om-fin-table .subtotal td { background:#e8f0fa; font-weight:600; color:var(--om-navy); }
  .om-fin-table .total-row td { background:var(--om-navy); color:#fff; font-weight:700; font-size:13px; }
  .om-fin-table .egi-row td { background:#1e3a5f; color:#fff; font-weight:700; font-size:13px; }
  .om-fin-table .noi-row td { background:#0a1628; color:#c9a84c; font-weight:700; font-size:14px; }
  .om-fin-table .right { text-align:right; font-family:'Cormorant Garamond',serif; font-size:14px; }
  .om-fin-table .label-col { color:#374151; }
  .om-fin-table .note { font-size:10px; color:var(--om-gray); }
  /* Compact variant for T12 Income Statement page */
  .om-fin-table-compact { font-size:12px; }
  .om-fin-table-compact tr td { padding:4px 8px; font-size:12px; }
  .om-fin-table-compact .section-header td { padding:5px 8px; font-size:9px; }
  .om-fin-table-compact .subtotal td { font-size:12px; font-weight:600; }
  .om-fin-table-compact .egi-row td { font-size:12px; font-weight:700; }
  .om-fin-table-compact .noi-row td { font-size:12px; font-weight:700; }
  .om-fin-table-compact .right { font-size:12px; }
  /* Financials stat cards */
  .om-fin-stats { display:flex; gap:14px; margin-bottom:18px; }
  .om-fin-stat { flex:1; background:var(--om-light-gray); border-radius:6px; padding:14px 16px; border-left:3px solid var(--om-navy); }
  .om-fin-stat-label { font-size:9px; text-transform:uppercase; letter-spacing:1.5px; color:var(--om-gray); margin-bottom:6px; }
  .om-fin-stat-value { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:700; color:var(--om-navy); }

  /* Sponsor */
  .om-sponsor-name { font-family:'Cormorant Garamond',serif; font-size:34px; font-weight:700; color:var(--om-navy); margin-bottom:14px; }
  .om-sponsor-chips { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:18px; }
  .om-sponsor-chip { padding:7px 14px; background:var(--om-light-gray); border:1px solid var(--om-border); border-radius:4px; font-size:12px; color:var(--om-navy); }
  .om-guarantor-box { border:1px solid var(--om-gold); border-radius:4px; padding:14px 18px; margin-top:16px; background:rgba(201,168,76,0.04); }
  .om-guarantor-label { font-size:9px; text-transform:uppercase; letter-spacing:2px; color:var(--om-gold); margin-bottom:5px; }
  .om-guarantor-val { font-size:14px; color:var(--om-navy); font-weight:500; }

  /* Source note */
  .om-source { font-size:10px; color:var(--om-gold); font-style:italic; margin-top:6px; }

  /* Callout box */
  .om-callout { border-left:4px solid var(--om-light-blue); background:var(--om-light-gray); padding:12px 16px; margin:12px 0; border-radius:0 4px 4px 0; font-size:13px; color:var(--om-navy); }

  /* Map — 220px for landscape page */
  .om-map-img { width:100%; height:220px; object-fit:cover; display:block; border:1px solid var(--om-border); border-radius:4px; }
  .om-map-placeholder { width:100%; height:220px; background:var(--om-light-gray); border:1px solid var(--om-border); border-radius:4px; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:8px; color:var(--om-gray); font-size:13px; }

  /* Photo gallery — 2×2, 280px images in landscape */
  .om-gallery-2x2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:0; max-height:440px; }
  .om-gallery-2x2 img { width:100%; height:210px; object-fit:cover; border-radius:4px; border:1px solid var(--om-border); display:block; }

  /* Chart containers */
  .om-chart-wrap { position:relative; margin-top:14px; }
  .om-chart-title { font-size:10px; text-transform:uppercase; letter-spacing:2px; color:var(--om-gray); margin-bottom:8px; font-weight:700; }

  /* Separator */
  .om-divider { height:1px; background:var(--om-border); margin:16px 0; }
  .om-gold-divider { height:1px; background:var(--om-gold); margin:14px 0; opacity:0.4; }

  /* Sources & uses bar */
  .om-su-bar { height:38px; display:flex; border-radius:4px; overflow:hidden; margin:12px 0; }
  .om-su-debt { background:var(--om-navy); display:flex; align-items:center; justify-content:center; color:#fff; font-size:12px; font-weight:500; }
  .om-su-equity { background:var(--om-light-blue); display:flex; align-items:center; justify-content:center; color:#fff; font-size:12px; font-weight:500; }
  .om-su-legend { display:flex; gap:20px; font-size:11px; color:var(--om-gray); }
  .om-su-legend-item { display:flex; align-items:center; gap:6px; }
  .om-su-dot-navy { width:10px; height:10px; border-radius:2px; background:var(--om-navy); }
  .om-su-dot-blue { width:10px; height:10px; border-radius:2px; background:var(--om-light-blue); }

  /* A.CRE badge */
  .acre-badge-light { display:inline-block; font-size:8px; padding:2px 5px; border-radius:3px; background:rgba(201,168,76,0.1); border:1px solid var(--om-gold); color:var(--om-gold); letter-spacing:1px; text-transform:uppercase; vertical-align:middle; margin-left:5px; }

  /* Print — US Letter landscape */
  @media print {
    @page { size:letter landscape; margin:0; }
    body { margin:0; padding:0; background:#fff; }
    header, .stage-bar, .nav, .om-actions, .om-top-bar { display:none !important; }
    .om-preview { background:#fff; }
    .container { padding:0; max-width:100%; }
    .om-section {
      width:1056px;
      min-height:816px;
      max-height:816px;
      box-shadow:none;
      margin:0;
      page-break-after:always;
      break-after:page;
      page-break-inside:avoid;
      -webkit-print-color-adjust:exact !important;
      print-color-adjust:exact !important;
    }
    .om-sec-header, .om-sec-footer, .om-cover-footer, .om-cover-gold-bar {
      -webkit-print-color-adjust:exact !important;
      print-color-adjust:exact !important;
    }
  }

  /* Gold numbered circles for highlights */
  .om-hl-num { width:36px; height:36px; border-radius:50%; background:var(--om-gold); color:#fff; font-family:'Cormorant Garamond',serif; font-size:14px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-bottom:10px; }

  /* Table of contents — tighter rows for landscape */
  .om-toc-row { display:flex; align-items:baseline; padding:7px 0; border-bottom:1px solid var(--om-border); }
  .om-toc-num { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--om-gold); width:54px; flex-shrink:0; }
  .om-toc-title { font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:700; color:var(--om-navy); min-width:200px; }
  .om-toc-dots { flex:1; border-bottom:2px dotted var(--om-border); margin:0 14px; position:relative; top:-4px; }
  .om-toc-page { font-size:11px; color:var(--om-gray); width:28px; text-align:right; }

  /* Closing page — landscape proportions */
  .om-closing { background:var(--om-navy) !important; display:flex; flex-direction:column; justify-content:space-between; min-height:816px; max-height:816px; }
  .om-closing-gold-bar { height:4px; background:linear-gradient(90deg,var(--om-gold),var(--om-light-blue)); flex-shrink:0; }
  .om-closing-body { padding:60px 80px 0; flex:1; display:flex; flex-direction:column; justify-content:center; }
  .om-closing-firm { font-family:'Cormorant Garamond',serif; font-size:44px; font-weight:700; color:#fff; margin-bottom:10px; line-height:1.1; }
  .om-closing-tagline { font-size:14px; color:rgba(255,255,255,0.5); margin-bottom:28px; }
  .om-closing-disc { font-size:10px; color:rgba(255,255,255,0.28); line-height:1.75; padding:24px 80px; border-top:1px solid rgba(255,255,255,0.1); flex-shrink:0; }

  /* Employer table */
  .om-emp-table { width:100%; border-collapse:collapse; font-size:12px; margin-top:8px; }
  .om-emp-table th { text-align:left; font-size:9px; text-transform:uppercase; letter-spacing:2px; color:#fff; padding:7px 12px; background:var(--om-navy); }
  .om-emp-table td { padding:7px 12px; border-bottom:1px solid var(--om-border); }
  .om-emp-table tr:nth-child(even) td { background:var(--om-light-gray); }


  /* ── S07-P3 Capital Markets & Macro ── */
  /* Hero strip */
  .a-hero { background:linear-gradient(135deg,var(--om-navy) 0%,#102540 100%); color:#fff; padding:14px 40px; flex-shrink:0; display:grid; grid-template-columns:1fr 340px; gap:28px; align-items:center; border-bottom:1px solid rgba(201,168,76,0.25); }
  .a-env-chip { display:inline-flex; align-items:center; gap:7px; padding:4px 12px; border-radius:3px; font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; }
  .a-env-chip::before { content:''; width:6px; height:6px; border-radius:50%; background:currentColor; }
  .a-env-chip.favorable { background:rgba(45,122,58,0.18); color:#4db86a; border:1px solid rgba(45,122,58,0.45); }
  .a-env-chip.cautious  { background:rgba(192,57,43,0.18);  color:#e05a4a; border:1px solid rgba(192,57,43,0.45); }
  .a-env-chip.neutral   { background:rgba(201,168,76,0.16); color:var(--om-gold); border:1px solid rgba(201,168,76,0.5); }
  .a-hero-headline { font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:600; line-height:1.3; color:#fff; }
  .a-bench-rail { display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.12); border-radius:5px; overflow:hidden; }
  .a-bench { background:#0d1d33; padding:9px 12px; text-align:center; }
  .a-bench-label { font-size:7.5px; letter-spacing:1.5px; text-transform:uppercase; color:rgba(255,255,255,0.5); margin-bottom:3px; }
  .a-bench-val { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:600; color:#fff; line-height:1; }
  .a-bench-val .pct { font-size:12px; }
  .a-bench-sub { font-size:7.5px; color:var(--om-gold); margin-top:3px; letter-spacing:0.5px; }
  /* Inflation band */
  .a-infl-band { display:grid; grid-template-columns:1fr 440px; gap:24px; align-items:center; padding:11px 40px; background:var(--om-light-gray); border-bottom:1px solid var(--om-border); flex-shrink:0; }
  .a-infl-narr { font-size:11px; line-height:1.55; color:var(--om-body); }
  .a-infl-narr b { color:var(--om-navy); font-weight:700; }
  .a-infl-points { display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:var(--om-border); border:1px solid var(--om-border); border-radius:5px; overflow:hidden; }
  .a-infl-pt { background:#fff; padding:7px 10px; text-align:center; }
  .a-infl-pt-label { font-size:7.5px; letter-spacing:1px; text-transform:uppercase; color:var(--om-gray); font-weight:600; margin-bottom:3px; }
  .a-infl-pt-val { font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:700; color:var(--om-navy); line-height:1; }
  .a-infl-pt-val small { font-size:11px; }
  .a-infl-pt-val .arr { font-size:10px; vertical-align:middle; margin-left:2px; }
  .a-infl-pt-val .arr.up   { color:var(--om-red,#c0392b); }
  .a-infl-pt-val .arr.down { color:#2d7a3a; }
  .a-infl-pt-val .arr.flat { color:var(--om-gray); }
  .a-infl-pt-sub { font-size:7px; color:var(--om-gray); margin-top:3px; letter-spacing:0.3px; }
  /* Body: rate matrix + sidebar */
  .a-body { flex:1; display:grid; grid-template-columns:1fr 300px; gap:0; min-height:0; overflow:hidden; }
  .a-matrix-pane { padding:14px 24px 10px 40px; display:flex; flex-direction:column; min-height:0; overflow:hidden; }
  .a-pane-title { font-size:9.5px; letter-spacing:2px; text-transform:uppercase; color:var(--om-navy); font-weight:700; margin-bottom:2px; display:flex; align-items:center; gap:8px; }
  .a-pane-cap { font-size:9.5px; color:var(--om-gray); line-height:1.4; margin-bottom:10px; }
  /* Rate sheet table */
  .rs-table { width:100%; border-collapse:collapse; font-variant-numeric:tabular-nums; }
  .rs-table th { font-size:8px; letter-spacing:1px; text-transform:uppercase; color:var(--om-gray); font-weight:600; text-align:right; padding:0 0 7px; border-bottom:1.5px solid var(--om-navy); }
  .rs-table th:first-child { text-align:left; }
  .rs-table td { font-size:11.5px; padding:8px 0; border-bottom:1px solid var(--om-border); text-align:right; color:var(--om-body); }
  .rs-table td:first-child { text-align:left; font-weight:600; color:var(--om-navy); }
  .rs-term { font-size:8px; letter-spacing:1px; text-transform:uppercase; color:var(--om-gray); font-weight:500; display:block; }
  .rs-rate { font-family:'Cormorant Garamond',serif; font-size:14px; font-weight:700; color:var(--om-navy); }
  .rs-spread { color:var(--om-body); }
  .rs-conf { display:inline-flex; gap:2px; }
  .rs-dot { width:6px; height:6px; border-radius:50%; background:var(--om-border); }
  .rs-dot.hi   { background:var(--om-green,#4a9e6a); }
  .rs-dot.mid  { background:var(--om-gold); }
  .rs-dot.low  { background:var(--om-gold); opacity:0.5; }
  .rs-row-subject { background:rgba(201,168,76,0.09); }
  .rs-row-subject td:first-child { box-shadow:inset 3px 0 0 var(--om-gold); padding-left:8px; }
  .rs-subject-tag { font-size:7px; letter-spacing:1px; text-transform:uppercase; color:#a07828; font-weight:700; background:rgba(201,168,76,0.18); padding:1px 5px; border-radius:3px; margin-left:5px; }
  .rs-footnote { margin-top:auto; padding-top:8px; font-size:8.5px; color:var(--om-gray); display:flex; gap:14px; flex-wrap:wrap; }
  /* Sidebar */
  .a-side { background:var(--om-light-gray); border-left:1px solid var(--om-border); padding:16px 24px; display:flex; flex-direction:column; gap:12px; overflow:hidden; }
  .a-quote-card { background:var(--om-navy); border-radius:6px; padding:14px 16px; color:#fff; flex-shrink:0; }
  .a-quote-label { font-size:8px; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.5); margin-bottom:5px; }
  .a-quote-rate { font-family:'Cormorant Garamond',serif; font-size:30px; font-weight:600; color:var(--om-gold); line-height:1; }
  .a-quote-rate small { font-size:15px; }
  .a-quote-meta { font-size:9.5px; color:rgba(255,255,255,0.65); margin-top:7px; line-height:1.5; }
  .a-mini-stats { display:flex; flex-direction:column; gap:0; flex:1; }
  .a-mini { display:flex; justify-content:space-between; align-items:baseline; padding:9px 0; border-bottom:1px solid var(--om-border); }
  .a-mini:last-child { border-bottom:0; }
  .a-mini-label { font-size:10px; color:var(--om-gray); line-height:1.3; max-width:140px; }
  .a-mini-val { font-family:'Cormorant Garamond',serif; font-size:17px; font-weight:700; color:var(--om-navy); white-space:nowrap; }
  .a-mini-val.pos { color:#2d7a3a; }
  .a-mini-val.neg { color:#c0392b; }
  .a-delinq-note { font-size:9px; color:var(--om-gray); padding-top:7px; line-height:1.4; }

  /* Sponsor — Option B Profile Card */
  .sp-logo-box { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; background:#fff; border:1px solid var(--om-border); border-radius:8px; width:100%; height:148px; }
  .sp-logo-mono { font-family:'Cormorant Garamond',serif; font-weight:700; color:var(--om-navy); font-size:60px; line-height:0.9; }
  .sp-logo-word { font-size:8px; letter-spacing:3px; text-transform:uppercase; color:var(--om-gray); }
  .sp-uploaded-logo { width:100%; height:148px; object-fit:contain; border-radius:8px; background:#fff; border:1px solid var(--om-border); padding:4px; box-sizing:border-box; }
  .b-grid { flex:1; display:grid; grid-template-columns:268px 1fr; min-height:0; }
  .b-rail { background:var(--om-light-gray); border:1px solid var(--om-border); border-radius:8px; padding:22px 20px; display:flex; flex-direction:column; gap:14px; }
  .b-name { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:700; color:var(--om-navy); line-height:1.1; }
  .b-facts { display:flex; flex-direction:column; }
  .b-fact { border-top:1px solid var(--om-border); padding:9px 0; }
  .b-fact:first-child { border-top:0; padding-top:0; }
  .b-fact-label { font-size:8px; letter-spacing:1.5px; text-transform:uppercase; color:var(--om-gray); font-weight:600; margin-bottom:3px; }
  .b-fact-val { font-size:13px; color:var(--om-navy); font-weight:600; line-height:1.3; }
  .b-main { padding:0 0 0 30px; display:flex; flex-direction:column; }
  .b-about { font-size:9px; letter-spacing:3px; text-transform:uppercase; color:var(--om-gold); font-weight:600; margin-bottom:10px; }
  .b-main .om-prose { font-size:15px; line-height:1.7; color:#374151; }
  .b-approach-wrap { margin-top:auto; padding-top:18px; }
  .b-approach-label { font-size:10px; letter-spacing:2.5px; text-transform:uppercase; color:var(--om-navy); font-weight:700; margin-bottom:16px; display:flex; align-items:center; gap:10px; }
